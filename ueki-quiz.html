<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>жӨҚжңЁз®—гғ»ж–№йҷЈз®— з·ҙзҝ’</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="common.js"></script>
<script src="review-common.js"></script>
<style>
  body { background: #ecfdf5; }
  .cursor-blink { color: #059669; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const SUBJECT_KEY = "calc";
const STORAGE_KEY = "ueki_best";


function genProblemOfType(t){return genProblem(t);}
function genProblem(forceType) {
  const type = forceType !== undefined ? forceType : Math.floor(Math.random() * 4);

  if (type === 0) {
    // зӣҙз·ҡгҒ«жӨҚгҒҲгӮӢпјҲдёЎз«ҜгҒӮгӮҠпјү
    const n = randInt(4,12), interval = randInt(2,8);
    const length = (n-1)*interval;
    return {_genType:type,
      title: "жӨҚжңЁз®—в‘ пјҲдёЎз«ҜгҒӮгӮҠпјү", color: "#059669",
      text: ` **${length}m** гҒ®йҒ“гҒ®дёЎз«ҜгӮ’еҗ«гӮҒгҒҰ
 **${interval}m** й–“йҡ”гҒ§жңЁгӮ’жӨҚгҒҲгҒҫгҒҷгҖӮ
жңЁгҒҜе…ЁйғЁгҒ§дҪ•жң¬гҒ§гҒҷгҒӢпјҹ`,
      answers: [{ label:"жң¬ж•°", value:n, unit:"жң¬" }],
      hints: [
        "рҹ”‘ дёЎз«ҜгҒӮгӮҠпјҡжң¬ж•°пјқй–“гҒ®ж•°пјӢ1",
        `й–“гҒ®ж•°пјҡ${length}Г·${interval}пјқ${n-1}`,
        `жң¬ж•°пјҡ${n-1}пјӢ1пјқ${n}жң¬ вң…`,
      ],
    };
  }

  if (type === 1) {
    // еҶҶеҪўпјҲжұ гҒ®е‘ЁгӮҠпјү
    const n = randInt(4,15), interval = randInt(2,8);
    const length = n*interval;
    return {_genType:type,
      title: "жӨҚжңЁз®—в‘ЎпјҲеҶҶеҪўпјү", color: "#047857",
      text: `жұ гҒ®е‘ЁгӮҠ **${length}m** гҒ«
 **${interval}m** й–“йҡ”гҒ§жңЁгӮ’жӨҚгҒҲгҒҫгҒҷгҖӮ
жңЁгҒҜе…ЁйғЁгҒ§дҪ•жң¬гҒ§гҒҷгҒӢпјҹ`,
      answers: [{ label:"жң¬ж•°", value:n, unit:"жң¬" }],
      hints: [
        "рҹ”‘ еҶҶеҪўпјҡжң¬ж•°пјқй–“гҒ®ж•°пјҲз«ҜгҒҢгҒӘгҒ„пјҒпјү",
        `й–“гҒ®ж•°пјҡ${length}Г·${interval}пјқ${n}`,
        `жң¬ж•°пјҡ${n}жң¬ вң…`,
      ],
    };
  }

  if (type === 2) {
    // ж–№йҷЈз®—пјҲжӯЈж–№еҪўгҒ«дёҰгҒ№гӮӢпјү
    const n = randInt(3,9); // 1иҫәгҒ®еҖӢж•°
    const outer = 4*(n-1); // еӨ–е‘ЁгҒ®еҖӢж•°
    const total = n*n;
    return {_genType:type,
      title: "ж–№йҷЈз®—в‘ пјҲеӨ–е‘Ёпјү", color: "#065f46",
      text: `зўҒзҹігӮ’жӯЈж–№еҪўгҒ«дёҰгҒ№гҒҫгҒҷгҖӮ
1иҫәгҒ« **${n}еҖӢ** гҒҡгҒӨдёҰгҒ№гҒҹгҒЁгҒҚгҖҒ
еӨ–е‘ЁгҒ®зўҒзҹігҒҜдҪ•еҖӢгҒ§гҒҷгҒӢпјҹ`,
      answers: [{ label:"еӨ–е‘ЁгҒ®еҖӢж•°", value:outer, unit:"еҖӢ" }],
      hints: [
        "рҹ”‘ еӨ–е‘Ёпјқ4Г—(1иҫәгҒ®ж•°вҲ’1)",
        `4Г—(${n}вҲ’1)пјқ4Г—${n-1}пјқ${outer}еҖӢ вң…`,
      ],
    };
  }

  // ж–№йҷЈз®—пјҲе…ЁдҪ“гҒ®еҖӢж•°пјү
  const n = randInt(3,9);
  const hollow = n*n - (n-2)*(n-2);
  return {_genType:type,
    title: "ж–№йҷЈз®—в‘ЎпјҲдёӯз©әж–№йҷЈпјү", color: "#064e3b",
    text: `зўҒзҹігӮ’жӯЈж–№еҪўгҒ®еҪўгҒ«дёҰгҒ№гҒҫгҒҷгҖӮ
еӨ–еҒҙгҒ®1иҫәгҒ« **${n}еҖӢ** дёҰгҒ№гҒҰ
дёӯгӮ’з©әжҙһгҒ«гҒ—гҒҫгҒҷгҖӮ
еҝ…иҰҒгҒӘзўҒзҹігҒҜдҪ•еҖӢгҒ§гҒҷгҒӢпјҹ`,
    answers: [{ label:"еҖӢж•°", value:hollow, unit:"еҖӢ" }],
    hints: [
      `рҹ”‘ еӨ–еҒҙгҒ®жӯЈж–№еҪў вҲ’ еҶ…еҒҙгҒ®жӯЈж–№еҪў`,
      `еӨ–еҒҙпјҡ${n}Г—${n}пјқ${n*n}еҖӢ`,
      `еҶ…еҒҙпјҡ${n-2}Г—${n-2}пјқ${(n-2)*(n-2)}еҖӢ`,
      `еҝ…иҰҒж•°пјҡ${n*n}вҲ’${(n-2)*(n-2)}пјқ${hollow}еҖӢ вң…`,
    ],
  };
}


function ScratchDisplay({ scratch, focused }) {
  if (!scratch) return (
    <>
      <span className="scratch-placeholder">гҒ“гҒ“гӮ’гӮҝгғғгғҒгҒ—гҒҰејҸгӮ’е…ҘеҠӣвҖҰ</span>
      {focused && <span className="cursor-blink">|</span>}
    </>
  );
  return (
    <>
      {scratch.split("\n").map((line, li, arr) => {
        const parts = line.split(/(пјқ-?\d+\.?\d*)/g);
        return (
          <div key={li} style={{ minHeight:"22px", lineHeight:"1.7" }}>
            {parts.map((p, pi) =>
              /^пјқ-?\d+\.?\d*$/.test(p)
                ? <span key={pi} className="calc-result-badge" style={{ background:"#fff3bf", color:"#e67700", borderBottom:"2px solid #ffd43b" }}>{p}</span>
                : <span key={pi}>{p}</span>
            )}
            {focused && li === arr.length - 1 && <span className="cursor-blink">|</span>}
          </div>
        );
      })}
    </>
  );
}

function App() {
  const [mode, setMode]               = useState("setup");
  const [totalQ, setTotalQ]           = useState(10);
  const [problems, setProblems]       = useState([]);
  const [current, setCurrent]         = useState(0);
  const [score, setScore]             = useState(0);
  const [scratch, setScratch]         = useState("");
  const [calcError, setCalcError]     = useState(false);
  const [answerVals, setAnswerVals]   = useState({});
  const [focused, setFocused]         = useState("scratch");
  const [checked, setChecked]         = useState(false);
  const [correct, setCorrect]         = useState({});
  const [hintIdx, setHintIdx]         = useState(-1);
  const [celeb, setCeleb]             = useState(false);
  const [streak, setStreak]           = useState(0);
  const [best, setBest]               = useState(0);
  const [confirmOpen, setConfirmOpen] = useState(false);
  const [reviewMode, setReviewMode] = useState(false);
  const [reviewBank, setReviewBank]   = useState([]);

  useEffect(() => {
    try { const s = localStorage.getItem(STORAGE_KEY); if (s) setBest(parseInt(s) || 0); } catch(_) {}
  }, []);
  const saveBest = v => { try { localStorage.setItem(STORAGE_KEY, String(v)); } catch(_) {} };

  const startQuiz = () => {
    const _bank=reviewGetAll(SUBJECT_KEY);setReviewBank(_bank);
    setProblems(reviewMode&&_bank.length>0?reviewGetProblems(SUBJECT_KEY,genProblemOfType).slice(0,totalQ):Array.from({length:totalQ},()=>genProblem()));
    setCurrent(0); setScore(0); setStreak(0);
    setScratch(""); setAnswerVals({}); setFocused("scratch");
    setChecked(false); setCorrect({}); setHintIdx(-1); setCeleb(false); setConfirmOpen(false);
    setMode("quiz");
  };

  const isScratch = focused === "scratch";
  const ansIdx = isScratch ? -1 : parseInt(focused.split("-")[1]);
  const problem = problems[current] || null;

  const pressKey = useCallback((key) => {
    if (key.val === "CALC") {
      if (!isScratch) return;
      const r = evalExpr(getExprToParse(scratch));
      if (r === null) { setCalcError(true); setTimeout(() => setCalcError(false), 600); return; }
      setScratch(s => s + `пјқ${r}`); return;
    }
    if (isScratch) {
      if (key.val === "BACK")        setScratch(s => { const m = s.match(/(пјқ-?\d+\.?\d*)$/); return m ? s.slice(0, -m[0].length) : s.slice(0, -1); });
      else if (key.val === "CLEAR")  setScratch("");
      else if (key.val === "=")      setScratch(s => s + "\n");
      else setScratch(s => s + key.val);
    } else {
      if (key.type === "op" || key.val === "CALC") return;
      setAnswerVals(prev => {
        const cur = prev[ansIdx] || "";
        if (key.val === "BACK")  return { ...prev, [ansIdx]: cur.slice(0, -1) };
        if (key.val === "CLEAR") return { ...prev, [ansIdx]: "" };
        if (key.val === "." && cur.includes(".")) return prev;
        if (cur.length >= 8) return prev;
        return { ...prev, [ansIdx]: cur + key.val };
      });
    }
  }, [isScratch, ansIdx, scratch]);

  const checkAll = () => {
    const r = {};
    problem.answers.forEach((a, i) => {
      r[i] = Math.abs(parseFloat(answerVals[i] || "") - a.value) < 0.01;
    });
    setCorrect(r); setChecked(true);
    if (Object.values(r).every(Boolean)) {
      setScore(s => s + 1); const ns = streak + 1; setStreak(ns);
      if (ns > best) { setBest(ns); saveBest(ns); }
      setCeleb(true); setTimeout(() => setCeleb(false), 2000); reviewMarkCorrect(SUBJECT_KEY,problem); setReviewBank(reviewGetAll(SUBJECT_KEY));
    } else { setStreak(0); reviewSave(SUBJECT_KEY,problem); setReviewBank(reviewGetAll(SUBJECT_KEY)); }
  };

  const nextQuestion = () => {
    if (current + 1 >= totalQ) { setMode("result"); return; }
    setCurrent(c => c + 1);
    setScratch(""); setAnswerVals({}); setFocused("scratch");
    setChecked(false); setCorrect({}); setHintIdx(-1); setCeleb(false);
  };

  const allCorrect = checked && Object.values(correct).every(Boolean);
  const BTN = "linear-gradient(135deg,#34d399,#059669)";
  const SHD = "#065f46";
  const TXT = "#fff";

  if (mode === "setup") return (
    <div className="setup-wrap" style={{ background: "#ecfdf5" }}>
      <div className="setup-card">
        <div className="setup-emoji">рҹ“қ</div>
        <h1 className="setup-title">{"жӨҚжңЁз®—гғ»ж–№йҷЈз®— з·ҙзҝ’"}</h1>
        <p className="setup-sub">е°ҸеӯҰж Ўй«ҳеӯҰе№ҙгғ¬гғҷгғ«</p>
                {/* еҫ©зҝ’гғўгғјгғү */}
        <div style={{marginBottom:"16px"}}>
          <button
            onClick={()=>reviewBank.length>0&&setReviewMode(r=>!r)}
            style={{width:"100%",padding:"12px 16px",borderRadius:"14px",
              cursor:reviewBank.length>0?"pointer":"default",
              border:reviewMode?"2px solid #ef4444":reviewBank.length>0?"2px solid #e5e7eb":"2px solid #e5e7eb",
              background:reviewMode?"#fef2f2":reviewBank.length>0?"#f9fafb":"#f9fafb",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <span style={{fontWeight:"900",fontSize:"14px",color:reviewMode?"#b91c1c":"#374151"}}>
              рҹ“ҡ еҫ©зҝ’гғўгғјгғү
            </span>
            <span style={{background:reviewBank.length>0?(reviewMode?"#ef4444":"#6b7280"):"#d1d5db",
              color:"#fff",borderRadius:"99px",padding:"2px 10px",fontSize:"12px",fontWeight:"bold"}}>
              {reviewBank.length>0?`${reviewBank.length}е•Ҹ`:"гҒӘгҒ—"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>й–“йҒ•гҒҲгҒҹе•ҸйЎҢгҒҢжәңгҒҫгӮӢгҒЁгҒ“гҒ“гҒ§еҫ©зҝ’гҒ§гҒҚгҒҫгҒҷ</div>}
          {reviewMode&&reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",textAlign:"center",marginTop:"4px",fontWeight:"bold"}}>вң… 5еӣһжӯЈи§ЈгҒ§еҫ©зҝ’гғӘгӮ№гғҲгҒӢгӮүеҚ’жҘӯпјҒ</div>}
        </div>
        {best > 0 && <div className="best-badge" style={{ background:"rgba(0,0,0,0.05)", border:"1.5px solid rgba(0,0,0,0.1)" }}>рҹҸҶ жңҖй«ҳйҖЈз¶ҡиЁҳйҢІпјҡ<strong>{best}е•Ҹ</strong></div>}
        <div className="qcount-section">дҪ•е•ҸгӮ„гӮӢпјҹ</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n => (
            <button key={n} className="qcount-btn"
              style={{ border: totalQ===n ? `2px solid #059669` : "2px solid #dee2e6", background: totalQ===n ? "#059669" : "#f8f9fa", color: totalQ===n ? "#fff" : "#495057", boxShadow: totalQ===n ? `0 3px 0 #065f46` : "none" }}
              onClick={() => setTotalQ(n)}>{n}е•Ҹ</button>
          ))}
        </div>
        <button className="start-btn" style={{ background: BTN, color: TXT, boxShadow: `0 4px 0 ${SHD}` }} onClick={startQuiz}>гӮ№гӮҝгғјгғҲпјҒ рҹҡҖ</button>
      </div>
    </div>
  );

  if (mode === "result") {
    const pct = Math.round((score / totalQ) * 100);
    return (
      <div className="setup-wrap" style={{ background: "#ecfdf5" }}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100 ? "рҹҸҶ" : pct>=70 ? "рҹҺү" : "рҹ’Ә"}</div>
          <h2 className="setup-title">гҒҠгӮҸгӮҠпјҒ</h2>
          <p className="result-score">{totalQ}е•Ҹдёӯ <span className="result-big" style={{ color: "#059669" }}>{score}</span> е•ҸжӯЈи§Ј</p>
          <div className="pct-bar-bg" style={{ background: "#e9ecef" }}><div className="pct-bar-fill" style={{ background: BTN, width: `${pct}%` }}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">гҒ“гҒ®еӣһгҒ®жңҖй«ҳйҖЈз¶ҡ</div><div className="streak-result-val" style={{ color:"#ef4444" }}>рҹ”Ҙ {streak}е•Ҹ</div></div>
            <div className="streak-result-box"><div className="streak-result-label">жӯҙд»ЈжңҖй«ҳйҖЈз¶ҡ</div><div className="streak-result-val" style={{ color:"#f59f00" }}>рҹҸҶ {best}е•Ҹ</div></div>
          </div>
          <div style={{ display:"flex", gap:"8px", marginTop:"16px" }}>
            <button className="start-btn" style={{ background: BTN, color: TXT, boxShadow: `0 4px 0 ${SHD}` }} onClick={startQuiz}>гӮӮгҒҶдёҖеәҰ</button>
            <button className="start-btn" style={{ background:"#868e96", color:"#fff", boxShadow:"0 4px 0 #495057" }} onClick={() => setMode("setup")}>иЁӯе®ҡгҒё</button>
          </div>
        </div>
      </div>
    );
  }

  if (!problem) return null;
  const progress = (current / totalQ) * 100;

  return (
    <div className="quiz-root" style={{ background: "#ecfdf5" }}>
      {confirmOpen && (
        <div className="confirm-overlay" onClick={() => setConfirmOpen(false)}>
          <div className="confirm-sheet" onClick={e => e.stopPropagation()}>
            <div className="confirm-title">рҹ“қ зӯ”гҒҲеҗҲгӮҸгҒӣгҒҷгӮӢпјҹ</div>
            <div className="confirm-sub">гҒҫгҒ зӣҙгҒ—гҒҹгҒ„гҒЁгҒ“гӮҚгҒҜгҒӘгҒ„пјҹ</div>
            <div className="confirm-btn-row">
              <button className="confirm-cancel-btn" onClick={() => setConfirmOpen(false)}>гӮӮгҒ©гӮӢ</button>
              <button className="confirm-ok-btn" style={{ background: BTN, color: TXT }} onClick={() => { setConfirmOpen(false); checkAll(); }}>зӯ”гҒҲеҗҲгӮҸгҒӣ вң”</button>
            </div>
          </div>
        </div>
      )}
      {celeb && (
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">рҹҺү</div>
            <div className="celeb-text" style={{ color: "#059669" }}>гҒӣгҒ„гҒӢгҒ„пјҒ</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak >= 3 && <div className="celeb-streak" style={{ background:"#ef4444" }}>рҹ”Ҙ {streak}гӮҢгӮ“гҒһгҒҸпјҒ</div>}
            {streak === best && streak > 1 && <div className="celeb-streak" style={{ background:"#f59f00", marginTop:"6px" }}>рҹҸҶ ж–°иЁҳйҢІпјҒ</div>}
          </div>
        </div>
      )}

      <div className="quiz-header">
        <div className="header-left">
          <span className="q-label">Q{current+1}<span className="q-total">/{totalQ}</span></span>
          <span className="type-tag" style={{ background: problem.color }}>{problem.title}</span>
        </div>
        <div className="header-right">
          <span className="score-label">вӯҗ {score}</span>
          {streak >= 2 && <span className="streak-tag-sm">рҹ”Ҙ{streak}</span>}
          {best > 0 && <span className="best-tag-sm">рҹҸҶ{best}</span>}
        </div>
      </div>

      <div className="progress-bg" style={{ background:"#e9ecef" }}>
        <div className="progress-fill" style={{ background: problem.color, width: `${progress}%` }}/>
      </div>

      <div className="problem-card" style={{ borderTop: `5px solid ${problem.color}` }}>
        {problem.text.split("\n").map((line, i) => (
          <p key={i} className="problem-line">
            {line.split(/(\*\*[^*]+\*\*)/).map((seg, j) =>
              seg.startsWith("**")
                ? <strong key={j} className="problem-em" style={{ color: problem.color }}>{seg.replace(/\*\*/g, "")}</strong>
                : seg
            )}
          </p>
        ))}
      </div>

      <div className="hint-section">
        <div className="hint-controls">
          <button className="hint-btn"
            onClick={() => setHintIdx(h => Math.min(h+1, problem.hints.length-1))}
            disabled={hintIdx >= problem.hints.length - 1}>
            рҹ’Ў гғ’гғігғҲ{hintIdx < 0 ? "гӮ’иҰӢгӮӢ" : `(${hintIdx+1}/${problem.hints.length})`}
          </button>
          {hintIdx >= 0 && <button className="hint-close-btn" onClick={() => setHintIdx(-1)}>вң• й–үгҒҳгӮӢ</button>}
        </div>
        {hintIdx >= 0 && (
          <div className="hint-box">
            {problem.hints.slice(0, hintIdx+1).map((h, i) => (
              <div key={i} style={{ fontSize:"13px", color:"#374151", lineHeight:"1.8", fontFamily:"monospace", whiteSpace:"pre-wrap", opacity: i < hintIdx ? 0.55 : 1 }}>{h}</div>
            ))}
          </div>
        )}
      </div>

      <div className="scratch-area"
        style={{ border: `2px solid ${calcError ? "#ff6b6b" : isScratch ? "#059669" : "#dee2e6"}`, boxShadow: isScratch && !calcError ? `0 0 0 3px ${"#34d399"}33` : calcError ? "0 0 0 3px rgba(255,107,107,0.15)" : "none", background: calcError ? "#fff5f5" : "#fff" }}
        onClick={() => setFocused("scratch")}>
        <div className="scratch-area-label-row">
          <span className="scratch-area-label">рҹ“қ йҖ”дёӯејҸ</span>
          <span className="scratch-area-hint">пјқиЁҲз®— гҒ§иҮӘеӢ•иЁҲз®—</span>
        </div>
        <div className="scratch-display"><ScratchDisplay scratch={scratch} focused={isScratch}/></div>
      </div>

      <div className="answers-row">
        {problem.answers.map((a, i) => {
          const isFoc = focused === `ans-${i}`;
          const isOk = checked ? correct[i] : null;
          return (
            <div key={i} className="answer-slot"
              style={{ background: isOk===true ? "#ebfbee" : isOk===false ? "#fff5f5" : "#fff", border: `2px solid ${isFoc ? "#059669" : isOk===true ? "#51cf66" : isOk===false ? "#ff6b6b" : "#dee2e6"}`, boxShadow: isFoc ? `0 0 0 3px ${"#34d399"}33` : "none" }}
              onClick={() => setFocused(`ans-${i}`)}>
              <div className="ans-label">{a.label}</div>
              <div style={{ display:"flex", alignItems:"baseline", gap:"4px" }}>
                <div className="ans-display">
                  {answerVals[i] || <span className="scratch-placeholder">?</span>}
                  {isFoc && <span className="cursor-blink">|</span>}
                </div>
                {a.unit && answerVals[i] && <span className="ans-unit">{a.unit}</span>}
              </div>
              {isOk === true  && <div className="ans-badge">вң…</div>}
              {isOk === false && <div className="ans-badge">вқҢ</div>}
              {checked && isOk === false && <div className="ans-correct-val" style={{ color: "#059669" }}>вҶ’ {a.value}{a.unit}</div>}
            </div>
          );
        })}
      </div>

      <div className="keypad" style={{ background:"#e9ecef" }}>
        {KEYPAD.map((row, ri) => (
          <div key={ri} className="key-row">
            {row.map(key => {
              const dis = !isScratch && (key.type === "op" || key.val === "CALC");
              let bg = "#fff", color = "#212529";
              if (key.type === "op")   { bg = "#74c0fc"; color = "#1864ab"; }
              if (key.type === "ctrl") { bg = "#ff8787"; color = "#fff"; }
              if (key.val === "CALC")  { bg = BTN; color = TXT; }
              if (dis)                 { bg = "#dee2e6"; color = "#adb5bd"; }
              return (
                <button key={key.val} className={`key-btn${key.val==="CALC"?" calc":""}${dis?" disabled":""}`}
                  style={{ background:bg, color, boxShadow: dis?"none":"0 3px 0 rgba(0,0,0,0.18)" }}
                  onClick={() => !dis && pressKey(key)} disabled={dis}>{key.label}</button>
              );
            })}
          </div>
        ))}
      </div>

      <div className="action-row">
        {!checked ? (
          <button className="check-btn" style={{ background:BTN, color:TXT, boxShadow:`0 4px 0 ${SHD}` }} onClick={() => setConfirmOpen(true)}>гҒ“гҒҹгҒҲгӮ’гғҒгӮ§гғғгӮҜ вң”</button>
        ) : (
          <>
            <button className="next-btn" style={{ background:"linear-gradient(135deg,#51cf66,#20c997)", color:"#fff", boxShadow:"0 4px 0 #2f9e44" }} onClick={nextQuestion}>
              {current+1 >= totalQ ? "зөҗжһңгӮ’иҰӢгӮӢ рҹҺү" : "гҒӨгҒҺгҒё вҶ’"}
            </button>
            {!allCorrect && <button className="retry-btn" onClick={() => { setChecked(false); setCorrect({}); }}>гӮ„гӮҠгҒӘгҒҠгҒҷ</button>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
