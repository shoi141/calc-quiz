<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>шжПхЙЗцАз ч╖┤ч┐Т</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="common.js"></script>
<script>
const REVIEW_CORRECT_NEEDED = 5;
function _reviewId(p){return((p.title||"")+("|")+(p._genType!==undefined?String(p._genType):p.question||"")).slice(0,60);}
function reviewGetAll(k){try{const r=localStorage.getItem("review_"+k);return r?JSON.parse(r):[];}catch(_){return[];}}
function _reviewSaveAll(k,b){try{localStorage.setItem("review_"+k,JSON.stringify(b));}catch(_){}}
function reviewSave(k,p){try{const bank=reviewGetAll(k),id=_reviewId(p),ex=bank.find(x=>x._id===id);if(ex){ex._missCount=(ex._missCount||0)+1;ex._correctCount=0;}else{const {figure,...s}=p;bank.push({...s,_id:id,_savedAt:Date.now(),_missCount:1,_correctCount:0,_isDynamic:p._genType!==undefined});}  _reviewSaveAll(k,bank);}catch(_){}}
function reviewMarkCorrect(k,p){try{const bank=reviewGetAll(k),id=_reviewId(p),idx=bank.findIndex(x=>x._id===id);if(idx===-1)return false;bank[idx]._correctCount=(bank[idx]._correctCount||0)+1;const grad=bank[idx]._correctCount>=REVIEW_CORRECT_NEEDED;if(grad)bank.splice(idx,1);_reviewSaveAll(k,bank);return grad;}catch(_){return false;}}
function reviewGetProblems(k,genFn){return reviewGetAll(k).map(e=>{if(e._isDynamic&&genFn&&e._genType!==undefined){try{const f=genFn(e._genType);if(f)return{...f,_id:e._id,_missCount:e._missCount,_correctCount:e._correctCount};}catch(_){}}return e;}).filter(Boolean);}
</script>
<style>
  body { background: #ecfeff; }
  .cursor-blink { color: #0891b2; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const QUIZ_KEY = "kisoku";
const STORAGE_KEY = "kisoku_best";


function genProblemOfType(t){return genProblem(t);}
function genProblem(forceType) {
  const type = forceType !== undefined ? forceType : Math.floor(Math.random() * 4);
  if (type === 0) {
    const a1=randInt(1,20), d=randInt(1,10), n=randInt(5,10);
    const seq=Array.from({length:n},(_,i)=>a1+d*i);
    const unkIdx=randInt(2,Math.min(5,n-1));
    const ans=seq[unkIdx];
    const shown=seq.map((v,i)=>i===unkIdx?"я╝Я":v).slice(0,6).join("уАБ");
    return {_genType:type,
      title:"шжПхЙЗцАзтСая╝ИчнЙх╖оя╝Й", color:"#0891b2",
      text:`цмбуБоцХ░хИЧуБошжПхЙЗуВТшжЛуБдуБСуБжуАБя╝ЯуВТц▒ВуВБуБкуБХуБДуАВ\n${shown}уАБтАж`,
      answers:[{label:"я╝Я",value:ans,unit:""}],
      hints:["ЁЯФС уБиуБкуВКхРИуБЖцХ░уБох╖оуВТшк┐уБ╣уВИуБЖ",`х╖оуБпцпОхЫЮ ${d} уБЪуБдхвЧуБИуБжуБДуВЛ`,`${unkIdx+1}чХкчЫо я╝Э ${a1}я╝Л${d}├Ч${unkIdx}я╝Э${ans} тЬЕ`],
    };
  }
  if (type === 1) {
    const a1=randInt(1,10), d=randInt(1,5), n=randInt(4,10);
    const last=a1+d*(n-1), sum=n*(a1+last)/2;
    return {_genType:type,
      title:"шжПхЙЗцАзтСбя╝ИхТМя╝Й", color:"#0e7490",
      text:`${a1}уБЛуВЙхзЛуБ╛уВК${d}уБЪуБдхвЧуБИуВЛцХ░хИЧуБо\nцЬАхИЭуБо **${n}хАЛ** уБохТМуВТц▒ВуВБуБкуБХуБДуАВ`,
      answers:[{label:"хТМ",value:sum,unit:""}],
      hints:["ЁЯФС (цЬАхИЭя╝ЛцЬАх╛М)├╖2├ЧхАЛцХ░",`цЬАх╛Мя╝Ъ${a1}я╝Л${d}├Ч${n-1}я╝Э${last}`,`хТМя╝Э(${a1}я╝Л${last})├╖2├Ч${n}я╝Э${sum} тЬЕ`],
    };
  }
  if (type === 2) {
    const n=randInt(3,8);
    return {_genType:type,
      title:"шжПхЙЗцАзтСвя╝ИхЫ│х╜вя╝Й", color:"#155e75",
      text:`цнгцЦ╣х╜вуВТф╕жуБ╣уБ╛уБЩуАВ\n1чХкчЫоя╝Ъ1хАЛуАБ2чХкчЫоя╝Ъ4хАЛуАБ3чХкчЫоя╝Ъ9хАЛтАж\n **${n}чХкчЫо** уБпф╜ХхАЛя╝Я`,
      answers:[{label:"хАЛцХ░",value:n*n,unit:"хАЛ"}],
      hints:["ЁЯФС 1┬▓уАБ2┬▓уАБ3┬▓тАж уБошжПхЙЗ",`nчХкчЫоя╝Эn├Чn`,`${n}чХкчЫоя╝Э${n}├Ч${n}я╝Э${n*n}хАЛ тЬЕ`],
    };
  }
  const cycleLen=randInt(2,4);
  const cycle=Array.from({length:cycleLen},(_,i)=>i+1);
  const n=randInt(10,30);
  const r=n%cycleLen;
  const ans=r===0?cycle[cycleLen-1]:cycle[r-1];
  return {_genType:type,
    title:"шжПхЙЗцАзтСгя╝ИхСицЬЯя╝Й", color:"#164e63",
    text:`уАМ${cycle.join("уАБ")}уАНуВТуБПуВКш┐ФуБЧуБ╛уБЩуАВ\n **${n}чХкчЫо** уБоцХ░уБпф╜ХуБзуБЩуБЛя╝Я`,
    answers:[{label:"чнФуБИ",value:ans,unit:""}],
    hints:[`ЁЯФС ${cycleLen}хАЛуБз1уБ╛уБиуБ╛уВК`,`${n}├╖${cycleLen}я╝Э${Math.floor(n/cycleLen)}уБВуБ╛уВК${r}`,r===0?`уБВуБ╛уВК0тЖТцЬАх╛МуБо${ans} тЬЕ`:`уБВуБ╛уВК${r}тЖТ${r}чХкчЫоуБо${ans} тЬЕ`],
  };
}


// тФАтФАтФА щАФф╕нх╝Пшбичд║ тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function ScratchDisplay({ scratch, focused }) {
  if (!scratch) return (
    <>
      <span className="scratch-placeholder">уБУуБУуВТуВ┐уГГуГБуБЧуБжх╝ПуВТхЕехКЫтАж</span>
      {focused&&<span className="cursor-blink">|</span>}
    </>
  );
  return (
    <>
      {scratch.split("\n").map((line,li,arr)=>{
        const parts=line.split(/(я╝Э-?\d+\.?\d*)/g);
        return(
          <div key={li} style={{minHeight:"22px",lineHeight:"1.7"}}>
            {parts.map((p,pi)=>
              /^я╝Э-?\d+\.?\d*$/.test(p)
                ?<span key={pi} className="calc-result-badge" style={{background:"#fff3bf",color:"#e67700",borderBottom:"2px solid #ffd43b"}}>{p}</span>
                :<span key={pi}>{p}</span>
            )}
            {focused&&li===arr.length-1&&<span className="cursor-blink">|</span>}
          </div>
        );
      })}
    </>
  );
}

// тФАтФАтФА уВвуГЧуГк тФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
function App() {
  const [mode,setMode]               = useState("setup");
  const [totalQ,setTotalQ]           = useState(10);
  const [problems,setProblems]       = useState([]);
  const [current,setCurrent]         = useState(0);
  const [score,setScore]             = useState(0);
  const [scratch,setScratch]         = useState("");
  const [calcError,setCalcError]     = useState(false);
  const [answerVals,setAnswerVals]   = useState({});
  const [focused,setFocused]         = useState("scratch");
  const [checked,setChecked]         = useState(false);
  const [correct,setCorrect]         = useState({});
  const [hintIdx,setHintIdx]         = useState(-1);
  const [celeb,setCeleb]             = useState(false);
  const [streak,setStreak]           = useState(0);
  const [best,setBest]               = useState(0);
  const [confirmOpen,setConfirmOpen] = useState(false);
  const [reviewBank,setReviewBank] = useState([]);

  useEffect(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s)setBest(parseInt(s)||0);}catch(_){}
    setReviewBank(reviewGetAll(QUIZ_KEY));
  },[]);
  const saveBest=v=>{try{localStorage.setItem(STORAGE_KEY,String(v));}catch(_){}};

  const startReview=()=>{
    const bank=reviewGetAll(QUIZ_KEY);
    setReviewBank(bank);
    if(bank.length===0){setMode("setup");return;}
    setProblems(reviewGetProblems(QUIZ_KEY,genProblemOfType));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);setConfirmOpen(false);
    setMode("review");
  };
  const startQuiz=()=>{
    setProblems(Array.from({length:totalQ},()=>genProblem()));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);setConfirmOpen(false);
    setMode("quiz");
  };

  const isScratch=focused==="scratch";
  const ansIdx=isScratch?-1:parseInt(focused.split("-")[1]);
  const problem=problems[current]||null;

  const pressKey=useCallback((key)=>{
    if(key.val==="CALC"){
      if(!isScratch)return;
      const r=evalExpr(getExprToParse(scratch));
      if(r===null){setCalcError(true);setTimeout(()=>setCalcError(false),600);return;}
      setScratch(s=>s+`я╝Э${r}`);return;
    }
    if(isScratch){
      if(key.val==="BACK")  setScratch(s=>{const m=s.match(/(я╝Э-?\d+\.?\d*)$/);return m?s.slice(0,-m[0].length):s.slice(0,-1);});
      else if(key.val==="CLEAR") setScratch("");
      else if(key.val==="=")     setScratch(s=>s+"\n");
      else setScratch(s=>s+key.val);
    }else{
      if(key.type==="op"||key.val==="CALC")return;
      setAnswerVals(prev=>{
        const cur=prev[ansIdx]||"";
        if(key.val==="BACK")  return{...prev,[ansIdx]:cur.slice(0,-1)};
        if(key.val==="CLEAR") return{...prev,[ansIdx]:""};
        if(key.val==="."&&cur.includes(".")) return prev;
        if(cur.length>=8)     return prev;
        return{...prev,[ansIdx]:cur+key.val};
      });
    }
  },[isScratch,ansIdx,scratch]);

  const checkAll=()=>{
    const r={};
    problem.answers.forEach((a,i)=>{
      const inputNum=parseFloat(answerVals[i]||"");
      r[i]=Math.abs(inputNum-a.value)<0.01;
    });
    setCorrect(r);setChecked(true);
    if(Object.values(r).every(Boolean)){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true);setTimeout(()=>setCeleb(false),2000);reviewMarkCorrect(QUIZ_KEY,problem);setReviewBank(reviewGetAll(QUIZ_KEY));
    }else{setStreak(0);reviewSave(QUIZ_KEY,problem);setReviewBank(reviewGetAll(QUIZ_KEY));}
  };

  const nextQuestion=()=>{
    const _end=current+1>=problems.length;
    if(_end&&mode==="review"){const b=reviewGetAll(QUIZ_KEY);setReviewBank(b);if(b.length>0){startReview();}else{setMode("graduated");}return;}
    if(_end){setMode("result");return;}
    setCurrent(c=>c+1);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);
  };

  const allCorrect=checked&&Object.values(correct).every(Boolean);

  const BTN = "linear-gradient(135deg,#22d3ee,#0891b2)";
  const SHD = "#0e7490";
  const TXT = "#fff";

  if(mode==="setup") return(
    <div className="setup-wrap" style={{background:"#ecfeff"}}>
      <div className="setup-card">
        <div className="setup-emoji">ЁЯУЭ</div>
        <h1 className="setup-title">{"шжПхЙЗцАз ч╖┤ч┐Т"}</h1>
        <p className="setup-sub">х░ПхнжцабщлШхнжх╣┤уГмуГЩуГл</p>
                {/* х╛йч┐ТуГвуГ╝уГЙ */}
        <div style={{marginBottom:"16px"}}>
          <button
            onClick={()=>{if(reviewBank.length>0){startReview();}}}
            style={{width:"100%",padding:"14px 16px",borderRadius:"14px",
              cursor:reviewBank.length>0?"pointer":"default",
              border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",
              background:reviewBank.length>0?"#fef2f2":"#f9fafb",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>
                ЁЯУЪ х╛йч┐ТуГвуГ╝уГЙ
              </div>
              {reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>уВ┐уГГуГЧуБЧуБжф╗КуБЩуБРщЦЛхзЛя╝Б</div>}
            </div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",
              color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>
              {reviewBank.length>0?`${reviewBank.length}хХП`:"уБкуБЧ"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>щЦУщБХуБИуБЯхХПщбМуБМц║ЬуБ╛уВЛуБиуБУуБУуБзх╛йч┐ТуБзуБНуБ╛уБЩ</div>}
        </div>
        {best>0&&<div className="best-badge" style={{background:"rgba(0,0,0,0.05)",border:"1.5px solid rgba(0,0,0,0.1)"}}>ЁЯПЖ цЬАщлШщАгч╢ЪшиШщМ▓я╝Ъ<strong>{best}хХП</strong></div>}
        <div className="qcount-section">ф╜ХхХПуВДуВЛя╝Я</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?`2px solid #0891b2`:"2px solid #dee2e6",background:totalQ===n?"#0891b2":"#f8f9fa",color:totalQ===n?"#fff":"#495057",boxShadow:totalQ===n?`0 3px 0 #0e7490`:"none"}}
              onClick={()=>setTotalQ(n)}>{n}хХП</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={startQuiz}>уВ╣уВ┐уГ╝уГИя╝Б ЁЯЪА</button>
      </div>
    </div>
  );


  if(mode==="graduated") return(
    <div className="setup-wrap" style={{background:"#f0fdf4"}}>
      <div className="setup-card">
        <div className="setup-emoji">ЁЯОУ</div>
        <h2 className="setup-title" style={{color:"#166534"}}>х╛йч┐ТуГРуГ│уВпхНТценя╝Б</h2>
        <p style={{fontSize:"14px",color:"#16a34a",marginBottom:"16px",fontWeight:"bold"}}>
          уБЩуБ╣уБжуБохХПщбМуВТ5хЫЮцнгшзгуБЧуБ╛уБЧуБЯя╝Б
        </p>
        <div style={{background:"#dcfce7",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#166534",lineHeight:"1.8"}}>
          ЁЯМЯ щЦУщБХуБИуБЯхХПщбМуВТуБЩуБ╣уБжуГЮуВ╣уВ┐уГ╝уБЧуБ╛уБЧуБЯя╝Б<br/>
          щАЪх╕╕уГвуГ╝уГЙуБзцЦ░уБЧуБДхХПщбМуБлцМСцИжуБЧуБ╛уБЧуВЗуБЖуАВ
        </div>
        <button className="start-btn" style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#fff",boxShadow:"0 4px 0 #16a34a"}}
          onClick={()=>setMode("setup")}>уВВуБйуВЛ</button>
      </div>
    </div>
  );

  if(mode==="result"){
    const pct=Math.round((score/totalQ)*100);
    return(
      <div className="setup-wrap" style={{background:"#ecfeff"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"ЁЯПЖ":pct>=70?"ЁЯОЙ":"ЁЯТк"}</div>
          <h2 className="setup-title">уБКуВПуВКя╝Б</h2>
          <p className="result-score">{totalQ}хХПф╕н <span className="result-big" style={{color:"#0891b2"}}>{score}</span> хХПцнгшзг</p>
          <div className="pct-bar-bg" style={{background:"#e9ecef"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">уБУуБохЫЮуБоцЬАщлШщАгч╢Ъ</div><div className="streak-result-val" style={{color:"#ef4444"}}>ЁЯФе {streak}хХП</div></div>
            <div className="streak-result-box"><div className="streak-result-label">цн┤ф╗гцЬАщлШщАгч╢Ъ</div><div className="streak-result-val" style={{color:"#f59f00"}}>ЁЯПЖ {best}хХП</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={startQuiz}>уВВуБЖф╕Ах║ж</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>шинхоЪуБ╕</button>
          </div>
          {reviewBank.length>0&&(
            <button className="start-btn"
              style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}}
              onClick={startReview}>ч╢ЪуБСуБжх╛йч┐ТуБЩуВЛ ЁЯУЪ ({reviewBank.length}хХП)</button>
          )}
        </div>
      </div>
    );
  }

  if(!problem) return null;
  const progress=(current/totalQ)*100;

  return(
    <div className="quiz-root" style={{background:"#ecfeff"}}>
      {confirmOpen&&(
        <div className="confirm-overlay" onClick={()=>setConfirmOpen(false)}>
          <div className="confirm-sheet" onClick={e=>e.stopPropagation()}>
            <div className="confirm-title">ЁЯУЭ чнФуБИхРИуВПуБЫуБЩуВЛя╝Я</div>
            <div className="confirm-sub">уБ╛уБачЫ┤уБЧуБЯуБДуБиуБУуВНуБпуБкуБДя╝Я</div>
            <div className="confirm-btn-row">
              <button className="confirm-cancel-btn" onClick={()=>setConfirmOpen(false)}>уВВуБйуВЛ</button>
              <button className="confirm-ok-btn" style={{background:BTN,color:TXT}} onClick={()=>{setConfirmOpen(false);checkAll();}}>чнФуБИхРИуВПуБЫ тЬФ</button>
            </div>
          </div>
        </div>
      )}
      {celeb&&(
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">ЁЯОЙ</div>
            <div className="celeb-text" style={{color:"#0891b2"}}>уБЫуБДуБЛуБДя╝Б</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#ef4444"}}>ЁЯФе {streak}уВМуВУуБЮуБПя╝Б</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>ЁЯПЖ цЦ░шиШщМ▓я╝Б</div>}
          </div>
        </div>
      )}

      <div className="quiz-header">
        <div className="header-left">
          <span className="q-label">Q{current+1}<span className="q-total">/{totalQ}</span></span>
          <span className="type-tag" style={{background:problem.color}}>{problem.title}</span>
        </div>
        <div className="header-right">
          <span className="score-label">тнР {score}</span>
          {streak>=2&&<span className="streak-tag-sm">ЁЯФе{streak}</span>}
          {best>0&&<span className="best-tag-sm">ЁЯПЖ{best}</span>}
        </div>
      </div>

      <div className="progress-bg" style={{background:"#e9ecef"}}>
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>

      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        {problem.text.split("\n").map((line,i)=>(
          <p key={i} className="problem-line">
            {line.split(/(\*\*[^*]+\*\*)/).map((seg,j)=>
              seg.startsWith("**")
                ?<strong key={j} className="problem-em" style={{color:problem.color}}>{seg.replace(/\*\*/g,"")}</strong>
                :seg
            )}
          </p>
        ))}
      </div>

      <div className="hint-section">
        <div className="hint-controls">
          <button className="hint-btn"
            onClick={()=>setHintIdx(h=>Math.min(h+1,problem.hints.length-1))}
            disabled={hintIdx>=problem.hints.length-1}
          >
            ЁЯТб уГТуГ│уГИ{hintIdx<0?"уВТшжЛуВЛ":`(${hintIdx+1}/${problem.hints.length})`}
          </button>
          {hintIdx>=0&&<button className="hint-close-btn" onClick={()=>setHintIdx(-1)}>тЬХ щЦЙуБШуВЛ</button>}
        </div>
        {hintIdx>=0&&(
          <div className="hint-box">
            {problem.hints.slice(0,hintIdx+1).map((h,i)=>(
              <div key={i} style={{fontSize:"13px",color:"#374151",lineHeight:"1.8",fontFamily:"monospace",whiteSpace:"pre-wrap",opacity:i<hintIdx?0.55:1}}>{h}</div>
            ))}
          </div>
        )}
      </div>

      <div className="scratch-area"
        style={{border:`2px solid ${calcError?"#ff6b6b":isScratch?"#0891b2":"#dee2e6"}`,boxShadow:isScratch&&!calcError?`0 0 0 3px ${"#22d3ee"}33`:calcError?"0 0 0 3px rgba(255,107,107,0.15)":"none",background:calcError?"#fff5f5":"#fff"}}
        onClick={()=>setFocused("scratch")}
      >
        <div className="scratch-area-label-row">
          <span className="scratch-area-label">ЁЯУЭ щАФф╕нх╝П</span>
          <span className="scratch-area-hint">я╝ЭшиИчоЧ уБзшЗкхЛХшиИчоЧ</span>
        </div>
        <div className="scratch-display"><ScratchDisplay scratch={scratch} focused={isScratch}/></div>
      </div>

      <div className="answers-row">
        {problem.answers.map((a,i)=>{
          const isFoc=focused===`ans-${i}`;
          const isOk=checked?correct[i]:null;
          return(
            <div key={i} className="answer-slot"
              style={{background:isOk===true?"#ebfbee":isOk===false?"#fff5f5":"#fff",border:`2px solid ${isFoc?"#0891b2":isOk===true?"#51cf66":isOk===false?"#ff6b6b":"#dee2e6"}`,boxShadow:isFoc?`0 0 0 3px ${"#22d3ee"}33`:"none"}}
              onClick={()=>setFocused(`ans-${i}`)}
            >
              <div className="ans-label">{a.label}</div>
              <div style={{display:"flex",alignItems:"baseline",gap:"4px"}}>
                <div className="ans-display">
                  {answerVals[i]||<span className="scratch-placeholder">?</span>}
                  {isFoc&&<span className="cursor-blink">|</span>}
                </div>
                {a.unit&&answerVals[i]&&<span className="ans-unit">{a.unit}</span>}
              </div>
              {isOk===true&&<div className="ans-badge">тЬЕ</div>}
              {isOk===false&&<div className="ans-badge">тЭМ</div>}
              {checked&&isOk===false&&<div className="ans-correct-val" style={{color:"#0891b2"}}>тЖТ {a.value}{a.unit}</div>}
            </div>
          );
        })}
      </div>

      <div className="keypad" style={{background:"#e9ecef"}}>
        {KEYPAD.map((row,ri)=>(
          <div key={ri} className="key-row">
            {row.map(key=>{
              const dis=!isScratch&&(key.type==="op"||key.val==="CALC");
              let bg="#fff",color="#212529";
              if(key.type==="op")  {bg="#74c0fc";color="#1864ab";}
              if(key.type==="ctrl"){bg="#ff8787";color="#fff";}
              if(key.val==="CALC") {bg=BTN;color=TXT;}
              if(dis)              {bg="#dee2e6";color="#adb5bd";}
              return(
                <button key={key.val} className={`key-btn${key.val==="CALC"?" calc":""}${dis?" disabled":""}`}
                  style={{background:bg,color,boxShadow:dis?"none":"0 3px 0 rgba(0,0,0,0.18)"}}
                  onClick={()=>!dis&&pressKey(key)} disabled={dis}
                >{key.label}</button>
              );
            })}
          </div>
        ))}
      </div>

      <div className="action-row">
        {!checked?(
          <button className="check-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={()=>setConfirmOpen(true)}>уБУуБЯуБИуВТуГБуВзуГГуВп тЬФ</button>
        ):(
          <>
            <button className="next-btn" style={{background:"linear-gradient(135deg,#51cf66,#20c997)",color:"#fff",boxShadow:"0 4px 0 #2f9e44"}} onClick={nextQuestion}>
              {current+1>=problems.length?(mode==="review"?(reviewGetAll(QUIZ_KEY).length>0?"ч╢ЪуБНуБ╕ ЁЯФБ":"хНТценя╝Б ЁЯОУ"):"ч╡РцЮЬуВТшжЛуВЛ ЁЯОЙ"):"уБдуБОуБ╕ тЖТ"}
            </button>
            {!allCorrect&&<button className="retry-btn" onClick={()=>{setChecked(false);setCorrect({});{}}}>уВДуВКуБкуБКуБЩ</button>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
