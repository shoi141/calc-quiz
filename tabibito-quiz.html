<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ж—…дәәз®— з·ҙзҝ’</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="common.js"></script>
<script>
const REVIEW_CORRECT_NEEDED = 5;
function _reviewId(p){return((p.title||"")+("|")+(p._genType!==undefined?String(p._genType):p.question||"")).slice(0,60);}
function reviewGetAll(k){try{const r=localStorage.getItem("review_"+k);return r?JSON.parse(r):[];}catch(_){return[];}}
function _reviewSaveAll(k,b){try{localStorage.setItem("review_"+k,JSON.stringify(b));}catch(_){}}
function reviewSave(k,p){try{const bank=reviewGetAll(k),id=_reviewId(p),ex=bank.find(x=>x._id===id);if(ex){ex._missCount=(ex._missCount||0)+1;ex._correctCount=0;}else{const {figure,...s}=p;bank.push({...s,_id:id,_savedAt:Date.now(),_missCount:1,_correctCount:0,_isDynamic:p._genType!==undefined});}  _reviewSaveAll(k,bank);}catch(_){}}
function reviewMarkCorrect(k,p){try{const bank=reviewGetAll(k),id=_reviewId(p),idx=bank.findIndex(x=>x._id===id);if(idx===-1)return false;bank[idx]._correctCount=(bank[idx]._correctCount||0)+1;const grad=bank[idx]._correctCount>=REVIEW_CORRECT_NEEDED;if(grad)bank.splice(idx,1);_reviewSaveAll(k,bank);return grad;}catch(_){return false;}}
function reviewGetProblems(k,genFn){return reviewGetAll(k).map(e=>{if(e._isDynamic&&genFn&&e._genType!==undefined){try{const f=genFn(e._genType);if(f)return{...f,_id:e._id,_missCount:e._missCount,_correctCount:e._correctCount};}catch(_){}}return e;}).filter(Boolean);}
</script>
<style>
  body { background: #f0fdf4; }
  .cursor-blink { color: #16a34a; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const QUIZ_KEY = "tabibito";
const STORAGE_KEY = "tabibito_best";


function genProblemOfType(t){return genProblem(t);}
function genProblem(forceType) {
  const type = forceType !== undefined ? forceType : Math.floor(Math.random() * 4);
  if (type === 0) {
    const vb=randInt(40,80), va=vb+randInt(10,40);
    const diff=va-vb, head=diff*randInt(3,12);
    return {_genType:type,
      title:"ж—…дәәз®—в‘ пјҲиҝҪгҒ„гҒӢгҒ‘пјү", color:"#16a34a",
      text:`AгҒЁBгҒҢеҗҢгҒҳж–№еҗ‘гҒ«йҖІгҒҝгҒҫгҒҷгҖӮ\nAгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${va}m**гҖҒBгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${vb}m**\nBгҒҢAгӮҲгӮҠ **${head}m** еүҚгҒ«гҒ„гҒҫгҒҷгҖӮ\nAгҒҢBгҒ«иҝҪгҒ„гҒӨгҒҸгҒ®гҒҜдҪ•еҲҶеҫҢпјҹ`,
      answers:[{label:"жҷӮй–“",value:head/diff,unit:"еҲҶеҫҢ"}],
      hints:[`зё®гҒҫгӮӢйҖҹгҒ•пјҡ${va}вҲ’${vb}пјқ${diff}m/еҲҶ`,`жҷӮй–“пјҡ${head}Г·${diff}пјқ${head/diff}еҲҶеҫҢ вң…`],
    };
  }
  if (type === 1) {
    const va=randInt(50,100), vb=randInt(50,100), sum=va+vb;
    const t=randInt(2,8), dist=sum*t;
    return {_genType:type,
      title:"ж—…дәәз®—в‘ЎпјҲеҗ‘гҒӢгҒ„еҗҲгҒ„пјү", color:"#15803d",
      text:`AгҒЁBгҒҢ **${dist}m** йӣўгӮҢгҒҰеҗ‘гҒӢгҒ„еҗҲгҒЈгҒҰжӯ©гҒҚгҒҫгҒҷгҖӮ\nAгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${va}m**гҖҒBгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${vb}m**\nдҪ•еҲҶеҫҢгҒ«еҮәдјҡгҒ„гҒҫгҒҷгҒӢпјҹ`,
      answers:[{label:"жҷӮй–“",value:t,unit:"еҲҶеҫҢ"}],
      hints:[`еҗҲгӮҸгҒӣгҒҹйҖҹгҒ•пјҡ${va}пјӢ${vb}пјқ${sum}m/еҲҶ`,`жҷӮй–“пјҡ${dist}Г·${sum}пјқ${t}еҲҶеҫҢ вң…`],
    };
  }
  if (type === 2) {
    const v2=randInt(40,70), diff=randInt(10,30), v1=v2+diff;
    const pool=diff*randInt(5,20);
    return {_genType:type,
      title:"ж—…дәәз®—в‘ўпјҲжұ гҒ®е‘ЁгӮҠпјү", color:"#166534",
      text:`жұ гҒ®е‘ЁгӮҠ **${pool}m** гӮ’еҗҢгҒҳж–№еҗ‘гҒ«жӯ©гҒҚгҒҫгҒҷгҖӮ\nAгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${v1}m**гҖҒBгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${v2}m**\n1е‘ЁиҝҪгҒ„и¶ҠгҒҷгҒ®гҒҜдҪ•еҲҶеҫҢпјҹ`,
      answers:[{label:"жҷӮй–“",value:pool/diff,unit:"еҲҶеҫҢ"}],
      hints:[`е·®гҒ®йҖҹгҒ•пјҡ${v1}вҲ’${v2}пјқ${diff}m/еҲҶ`,`жҷӮй–“пјҡ${pool}Г·${diff}пјқ${pool/diff}еҲҶеҫҢ вң…`],
    };
  }
  const va=randInt(60,120), vb=randInt(50,100), t=randInt(3,10);
  return {_genType:type,
    title:"ж—…дәәз®—в‘ЈпјҲйӣўгӮҢгӮӢпјү", color:"#14532d",
    text:`AгҒЁBгҒҢеҸҚеҜҫж–№еҗ‘гҒ«жӯ©гҒҚгҒҫгҒҷгҖӮ\nAгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${va}m**гҖҒBгҒ®йҖҹгҒ•пјҡжҜҺеҲҶ **${vb}m**\n **${t}еҲҶеҫҢ** гҒ«дҪ•mйӣўгӮҢгҒҰгҒ„гҒҫгҒҷгҒӢпјҹ`,
    answers:[{label:"и·қйӣў",value:(va+vb)*t,unit:"m"}],
    hints:[`еҗҲгӮҸгҒӣгҒҹйҖҹгҒ•пјҡ${va}пјӢ${vb}пјқ${va+vb}m/еҲҶ`,`и·қйӣўпјҡ${va+vb}Г—${t}пјқ${(va+vb)*t}m вң…`],
  };
}


// в”Җв”Җв”Җ йҖ”дёӯејҸиЎЁзӨә в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function ScratchDisplay({ scratch, focused }) {
  if (!scratch) return (
    <>
      <span className="scratch-placeholder">гҒ“гҒ“гӮ’гӮҝгғғгғҒгҒ—гҒҰејҸгӮ’е…ҘеҠӣвҖҰ</span>
      {focused&&<span className="cursor-blink">|</span>}
    </>
  );
  return (
    <>
      {scratch.split("\n").map((line,li,arr)=>{
        const parts=line.split(/(пјқ-?\d+\.?\d*)/g);
        return(
          <div key={li} style={{minHeight:"22px",lineHeight:"1.7"}}>
            {parts.map((p,pi)=>
              /^пјқ-?\d+\.?\d*$/.test(p)
                ?<span key={pi} className="calc-result-badge" style={{background:"#fff3bf",color:"#e67700",borderBottom:"2px solid #ffd43b"}}>{p}</span>
                :<span key={pi}>{p}</span>
            )}
            {focused&&li===arr.length-1&&<span className="cursor-blink">|</span>}
          </div>
        );
      })}
    </>
  );
}

// в”Җв”Җв”Җ гӮўгғ—гғӘ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function App() {
  const [mode,setMode]               = useState("setup");
  const [totalQ,setTotalQ]           = useState(10);
  const [problems,setProblems]       = useState([]);
  const [current,setCurrent]         = useState(0);
  const [score,setScore]             = useState(0);
  const [scratch,setScratch]         = useState("");
  const [calcError,setCalcError]     = useState(false);
  const [answerVals,setAnswerVals]   = useState({});
  const [focused,setFocused]         = useState("scratch");
  const [checked,setChecked]         = useState(false);
  const [correct,setCorrect]         = useState({});
  const [hintIdx,setHintIdx]         = useState(-1);
  const [celeb,setCeleb]             = useState(false);
  const [streak,setStreak]           = useState(0);
  const [best,setBest]               = useState(0);
  const [confirmOpen,setConfirmOpen] = useState(false);
  const [reviewBank,setReviewBank] = useState([]);

  useEffect(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s)setBest(parseInt(s)||0);}catch(_){}
    setReviewBank(reviewGetAll(QUIZ_KEY));
  },[]);
  const saveBest=v=>{try{localStorage.setItem(STORAGE_KEY,String(v));}catch(_){}};

  const startReview=()=>{
    const bank=reviewGetAll(QUIZ_KEY);
    setReviewBank(bank);
    if(bank.length===0){setMode("setup");return;}
    setProblems(reviewGetProblems(QUIZ_KEY,genProblemOfType));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);setConfirmOpen(false);
    setMode("review");
  };
  const startQuiz=()=>{
    setProblems(Array.from({length:totalQ},()=>genProblem()));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);setConfirmOpen(false);
    setMode("quiz");
  };

  const isScratch=focused==="scratch";
  const ansIdx=isScratch?-1:parseInt(focused.split("-")[1]);
  const problem=problems[current]||null;

  const pressKey=useCallback((key)=>{
    if(key.val==="CALC"){
      if(!isScratch)return;
      const r=evalExpr(getExprToParse(scratch));
      if(r===null){setCalcError(true);setTimeout(()=>setCalcError(false),600);return;}
      setScratch(s=>s+`пјқ${r}`);return;
    }
    if(isScratch){
      if(key.val==="BACK")  setScratch(s=>{const m=s.match(/(пјқ-?\d+\.?\d*)$/);return m?s.slice(0,-m[0].length):s.slice(0,-1);});
      else if(key.val==="CLEAR") setScratch("");
      else if(key.val==="=")     setScratch(s=>s+"\n");
      else setScratch(s=>s+key.val);
    }else{
      if(key.type==="op"||key.val==="CALC")return;
      setAnswerVals(prev=>{
        const cur=prev[ansIdx]||"";
        if(key.val==="BACK")  return{...prev,[ansIdx]:cur.slice(0,-1)};
        if(key.val==="CLEAR") return{...prev,[ansIdx]:""};
        if(key.val==="."&&cur.includes(".")) return prev;
        if(cur.length>=8)     return prev;
        return{...prev,[ansIdx]:cur+key.val};
      });
    }
  },[isScratch,ansIdx,scratch]);

  const checkAll=()=>{
    const r={};
    problem.answers.forEach((a,i)=>{
      const inputNum=parseFloat(answerVals[i]||"");
      r[i]=Math.abs(inputNum-a.value)<0.01;
    });
    setCorrect(r);setChecked(true);
    if(Object.values(r).every(Boolean)){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true);setTimeout(()=>setCeleb(false),2000);reviewMarkCorrect(QUIZ_KEY,problem);setReviewBank(reviewGetAll(QUIZ_KEY));
    }else{setStreak(0);reviewSave(QUIZ_KEY,problem);setReviewBank(reviewGetAll(QUIZ_KEY));}
  };

  const nextQuestion=()=>{
    const _end=current+1>=problems.length;
    if(_end&&mode==="review"){const b=reviewGetAll(QUIZ_KEY);setReviewBank(b);if(b.length>0){startReview();}else{setMode("graduated");}return;}
    if(_end){setMode("result");return;}
    setCurrent(c=>c+1);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);
  };

  const allCorrect=checked&&Object.values(correct).every(Boolean);

  const BTN = "linear-gradient(135deg,#4ade80,#16a34a)";
  const SHD = "#14532d";
  const TXT = "#fff";

  if(mode==="setup") return(
    <div className="setup-wrap" style={{background:"#f0fdf4"}}>
      <div className="setup-card">
        <div className="setup-emoji">рҹ“қ</div>
        <h1 className="setup-title">{"ж—…дәәз®— з·ҙзҝ’"}</h1>
        <p className="setup-sub">е°ҸеӯҰж Ўй«ҳеӯҰе№ҙгғ¬гғҷгғ«</p>
                {/* еҫ©зҝ’гғўгғјгғү */}
        <div style={{marginBottom:"16px"}}>
          <button
            onClick={()=>{if(reviewBank.length>0){startReview();}}}
            style={{width:"100%",padding:"14px 16px",borderRadius:"14px",
              cursor:reviewBank.length>0?"pointer":"default",
              border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",
              background:reviewBank.length>0?"#fef2f2":"#f9fafb",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>
                рҹ“ҡ еҫ©зҝ’гғўгғјгғү
              </div>
              {reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>гӮҝгғғгғ—гҒ—гҒҰд»ҠгҒҷгҒҗй–Ӣе§ӢпјҒ</div>}
            </div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",
              color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>
              {reviewBank.length>0?`${reviewBank.length}е•Ҹ`:"гҒӘгҒ—"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>й–“йҒ•гҒҲгҒҹе•ҸйЎҢгҒҢжәңгҒҫгӮӢгҒЁгҒ“гҒ“гҒ§еҫ©зҝ’гҒ§гҒҚгҒҫгҒҷ</div>}
        </div>
        {best>0&&<div className="best-badge" style={{background:"rgba(0,0,0,0.05)",border:"1.5px solid rgba(0,0,0,0.1)"}}>рҹҸҶ жңҖй«ҳйҖЈз¶ҡиЁҳйҢІпјҡ<strong>{best}е•Ҹ</strong></div>}
        <div className="qcount-section">дҪ•е•ҸгӮ„гӮӢпјҹ</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?`2px solid #16a34a`:"2px solid #dee2e6",background:totalQ===n?"#16a34a":"#f8f9fa",color:totalQ===n?"#fff":"#495057",boxShadow:totalQ===n?`0 3px 0 #14532d`:"none"}}
              onClick={()=>setTotalQ(n)}>{n}е•Ҹ</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={startQuiz}>гӮ№гӮҝгғјгғҲпјҒ рҹҡҖ</button>
      </div>
    </div>
  );


  if(mode==="graduated") return(
    <div className="setup-wrap" style={{background:"#f0fdf4"}}>
      <div className="setup-card">
        <div className="setup-emoji">рҹҺ“</div>
        <h2 className="setup-title" style={{color:"#166534"}}>еҫ©зҝ’гғҗгғігӮҜеҚ’жҘӯпјҒ</h2>
        <p style={{fontSize:"14px",color:"#16a34a",marginBottom:"16px",fontWeight:"bold"}}>
          гҒҷгҒ№гҒҰгҒ®е•ҸйЎҢгӮ’5еӣһжӯЈи§ЈгҒ—гҒҫгҒ—гҒҹпјҒ
        </p>
        <div style={{background:"#dcfce7",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#166534",lineHeight:"1.8"}}>
          рҹҢҹ й–“йҒ•гҒҲгҒҹе•ҸйЎҢгӮ’гҒҷгҒ№гҒҰгғһгӮ№гӮҝгғјгҒ—гҒҫгҒ—гҒҹпјҒ<br/>
          йҖҡеёёгғўгғјгғүгҒ§ж–°гҒ—гҒ„е•ҸйЎҢгҒ«жҢ‘жҲҰгҒ—гҒҫгҒ—гӮҮгҒҶгҖӮ
        </div>
        <button className="start-btn" style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#fff",boxShadow:"0 4px 0 #16a34a"}}
          onClick={()=>setMode("setup")}>гӮӮгҒ©гӮӢ</button>
      </div>
    </div>
  );

  if(mode==="result"){
    const pct=Math.round((score/totalQ)*100);
    return(
      <div className="setup-wrap" style={{background:"#f0fdf4"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"рҹҸҶ":pct>=70?"рҹҺү":"рҹ’Ә"}</div>
          <h2 className="setup-title">гҒҠгӮҸгӮҠпјҒ</h2>
          <p className="result-score">{totalQ}е•Ҹдёӯ <span className="result-big" style={{color:"#16a34a"}}>{score}</span> е•ҸжӯЈи§Ј</p>
          <div className="pct-bar-bg" style={{background:"#e9ecef"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">гҒ“гҒ®еӣһгҒ®жңҖй«ҳйҖЈз¶ҡ</div><div className="streak-result-val" style={{color:"#ef4444"}}>рҹ”Ҙ {streak}е•Ҹ</div></div>
            <div className="streak-result-box"><div className="streak-result-label">жӯҙд»ЈжңҖй«ҳйҖЈз¶ҡ</div><div className="streak-result-val" style={{color:"#f59f00"}}>рҹҸҶ {best}е•Ҹ</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={startQuiz}>гӮӮгҒҶдёҖеәҰ</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>иЁӯе®ҡгҒё</button>
          </div>
          {reviewBank.length>0&&(
            <button className="start-btn"
              style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}}
              onClick={startReview}>з¶ҡгҒ‘гҒҰеҫ©зҝ’гҒҷгӮӢ рҹ“ҡ ({reviewBank.length}е•Ҹ)</button>
          )}
        </div>
      </div>
    );
  }

  if(!problem) return null;
  const progress=(current/totalQ)*100;

  return(
    <div className="quiz-root" style={{background:"#f0fdf4"}}>
      {confirmOpen&&(
        <div className="confirm-overlay" onClick={()=>setConfirmOpen(false)}>
          <div className="confirm-sheet" onClick={e=>e.stopPropagation()}>
            <div className="confirm-title">рҹ“қ зӯ”гҒҲеҗҲгӮҸгҒӣгҒҷгӮӢпјҹ</div>
            <div className="confirm-sub">гҒҫгҒ зӣҙгҒ—гҒҹгҒ„гҒЁгҒ“гӮҚгҒҜгҒӘгҒ„пјҹ</div>
            <div className="confirm-btn-row">
              <button className="confirm-cancel-btn" onClick={()=>setConfirmOpen(false)}>гӮӮгҒ©гӮӢ</button>
              <button className="confirm-ok-btn" style={{background:BTN,color:TXT}} onClick={()=>{setConfirmOpen(false);checkAll();}}>зӯ”гҒҲеҗҲгӮҸгҒӣ вң”</button>
            </div>
          </div>
        </div>
      )}
      {celeb&&(
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">рҹҺү</div>
            <div className="celeb-text" style={{color:"#16a34a"}}>гҒӣгҒ„гҒӢгҒ„пјҒ</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#ef4444"}}>рҹ”Ҙ {streak}гӮҢгӮ“гҒһгҒҸпјҒ</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>рҹҸҶ ж–°иЁҳйҢІпјҒ</div>}
          </div>
        </div>
      )}

      <div className="quiz-header">
        <div className="header-left">
          <span className="q-label">Q{current+1}<span className="q-total">/{totalQ}</span></span>
          <span className="type-tag" style={{background:problem.color}}>{problem.title}</span>
        </div>
        <div className="header-right">
          <span className="score-label">вӯҗ {score}</span>
          {streak>=2&&<span className="streak-tag-sm">рҹ”Ҙ{streak}</span>}
          {best>0&&<span className="best-tag-sm">рҹҸҶ{best}</span>}
        </div>
      </div>

      <div className="progress-bg" style={{background:"#e9ecef"}}>
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>

      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        {problem.text.split("\n").map((line,i)=>(
          <p key={i} className="problem-line">
            {line.split(/(\*\*[^*]+\*\*)/).map((seg,j)=>
              seg.startsWith("**")
                ?<strong key={j} className="problem-em" style={{color:problem.color}}>{seg.replace(/\*\*/g,"")}</strong>
                :seg
            )}
          </p>
        ))}
      </div>

      <div className="hint-section">
        <div className="hint-controls">
          <button className="hint-btn"
            onClick={()=>setHintIdx(h=>Math.min(h+1,problem.hints.length-1))}
            disabled={hintIdx>=problem.hints.length-1}
          >
            рҹ’Ў гғ’гғігғҲ{hintIdx<0?"гӮ’иҰӢгӮӢ":`(${hintIdx+1}/${problem.hints.length})`}
          </button>
          {hintIdx>=0&&<button className="hint-close-btn" onClick={()=>setHintIdx(-1)}>вң• й–үгҒҳгӮӢ</button>}
        </div>
        {hintIdx>=0&&(
          <div className="hint-box">
            {problem.hints.slice(0,hintIdx+1).map((h,i)=>(
              <div key={i} style={{fontSize:"13px",color:"#374151",lineHeight:"1.8",fontFamily:"monospace",whiteSpace:"pre-wrap",opacity:i<hintIdx?0.55:1}}>{h}</div>
            ))}
          </div>
        )}
      </div>

      <div className="scratch-area"
        style={{border:`2px solid ${calcError?"#ff6b6b":isScratch?"#16a34a":"#dee2e6"}`,boxShadow:isScratch&&!calcError?`0 0 0 3px ${"#4ade80"}33`:calcError?"0 0 0 3px rgba(255,107,107,0.15)":"none",background:calcError?"#fff5f5":"#fff"}}
        onClick={()=>setFocused("scratch")}
      >
        <div className="scratch-area-label-row">
          <span className="scratch-area-label">рҹ“қ йҖ”дёӯејҸ</span>
          <span className="scratch-area-hint">пјқиЁҲз®— гҒ§иҮӘеӢ•иЁҲз®—</span>
        </div>
        <div className="scratch-display"><ScratchDisplay scratch={scratch} focused={isScratch}/></div>
      </div>

      <div className="answers-row">
        {problem.answers.map((a,i)=>{
          const isFoc=focused===`ans-${i}`;
          const isOk=checked?correct[i]:null;
          return(
            <div key={i} className="answer-slot"
              style={{background:isOk===true?"#ebfbee":isOk===false?"#fff5f5":"#fff",border:`2px solid ${isFoc?"#16a34a":isOk===true?"#51cf66":isOk===false?"#ff6b6b":"#dee2e6"}`,boxShadow:isFoc?`0 0 0 3px ${"#4ade80"}33`:"none"}}
              onClick={()=>setFocused(`ans-${i}`)}
            >
              <div className="ans-label">{a.label}</div>
              <div style={{display:"flex",alignItems:"baseline",gap:"4px"}}>
                <div className="ans-display">
                  {answerVals[i]||<span className="scratch-placeholder">?</span>}
                  {isFoc&&<span className="cursor-blink">|</span>}
                </div>
                {a.unit&&answerVals[i]&&<span className="ans-unit">{a.unit}</span>}
              </div>
              {isOk===true&&<div className="ans-badge">вң…</div>}
              {isOk===false&&<div className="ans-badge">вқҢ</div>}
              {checked&&isOk===false&&<div className="ans-correct-val" style={{color:"#16a34a"}}>вҶ’ {a.value}{a.unit}</div>}
            </div>
          );
        })}
      </div>

      <div className="keypad" style={{background:"#e9ecef"}}>
        {KEYPAD.map((row,ri)=>(
          <div key={ri} className="key-row">
            {row.map(key=>{
              const dis=!isScratch&&(key.type==="op"||key.val==="CALC");
              let bg="#fff",color="#212529";
              if(key.type==="op")  {bg="#74c0fc";color="#1864ab";}
              if(key.type==="ctrl"){bg="#ff8787";color="#fff";}
              if(key.val==="CALC") {bg=BTN;color=TXT;}
              if(dis)              {bg="#dee2e6";color="#adb5bd";}
              return(
                <button key={key.val} className={`key-btn${key.val==="CALC"?" calc":""}${dis?" disabled":""}`}
                  style={{background:bg,color,boxShadow:dis?"none":"0 3px 0 rgba(0,0,0,0.18)"}}
                  onClick={()=>!dis&&pressKey(key)} disabled={dis}
                >{key.label}</button>
              );
            })}
          </div>
        ))}
      </div>

      <div className="action-row">
        {!checked?(
          <button className="check-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={()=>setConfirmOpen(true)}>гҒ“гҒҹгҒҲгӮ’гғҒгӮ§гғғгӮҜ вң”</button>
        ):(
          <>
            <button className="next-btn" style={{background:"linear-gradient(135deg,#51cf66,#20c997)",color:"#fff",boxShadow:"0 4px 0 #2f9e44"}} onClick={nextQuestion}>
              {current+1>=problems.length?(mode==="review"?(reviewGetAll(QUIZ_KEY).length>0?"з¶ҡгҒҚгҒё рҹ”Ғ":"еҚ’жҘӯпјҒ рҹҺ“"):"зөҗжһңгӮ’иҰӢгӮӢ рҹҺү"):"гҒӨгҒҺгҒё вҶ’"}
            </button>
            {!allCorrect&&<button className="retry-btn" onClick={()=>{setChecked(false);setCorrect({});{}}}>гӮ„гӮҠгҒӘгҒҠгҒҷ</button>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
