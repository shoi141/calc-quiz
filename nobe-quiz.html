<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>のべ算・平均算 練習</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="common.js"></script>
<script>
// ── 復習バンク共通ユーティリティ ─────────────────────────────
// 正解5回で復習バンクから削除（反復記憶方式）
// 計算問題はタイプIDのみ保存 → 復習時に数字を再生成

const REVIEW_CORRECT_NEEDED = 5;

function _reviewId(problem) {
  return (problem.title + "|" + problem.question).slice(0, 60);
}

function reviewGetAll(subjectKey) {
  try {
    const raw = localStorage.getItem("review_" + subjectKey);
    return raw ? JSON.parse(raw) : [];
  } catch(_) { return []; }
}

function _reviewSaveAll(subjectKey, bank) {
  try {
    localStorage.setItem("review_" + subjectKey, JSON.stringify(bank));
  } catch(_) {}
}

// 間違えたとき保存
// _genType があるなら（動的生成問題）タイプ番号だけ保存
function reviewSave(subjectKey, problem) {
  try {
    const bank = reviewGetAll(subjectKey);
    const id = _reviewId(problem);
    const existing = bank.find(p => p._id === id);
    if (existing) {
      existing._missCount = (existing._missCount || 0) + 1;
      existing._correctCount = 0;
    } else {
      // 動的生成問題（_genType あり）はタイプ番号だけ保存
      if (problem._genType !== undefined) {
        bank.push({
          _id: id,
          _savedAt: Date.now(),
          _missCount: 1,
          _correctCount: 0,
          _genType: problem._genType,   // ← タイプ番号のみ
          _isDynamic: true,
          title: problem.title,         // 表示用
          diff: problem.diff || "shogaku",
        });
      } else {
        // 静的問題（○×・選択・記述）はそのまま保存
        const { figure, ...saveable } = problem;
        bank.push({
          ...saveable,
          _id: id,
          _savedAt: Date.now(),
          _missCount: 1,
          _correctCount: 0,
          _isDynamic: false,
        });
      }
    }
    _reviewSaveAll(subjectKey, bank);
  } catch(_) {}
}

// 正解時：correctCount+1、5回で卒業。trueなら卒業
function reviewMarkCorrect(subjectKey, problem) {
  try {
    const bank = reviewGetAll(subjectKey);
    const id = _reviewId(problem);
    const idx = bank.findIndex(p => p._id === id);
    if (idx === -1) return false;
    bank[idx]._correctCount = (bank[idx]._correctCount || 0) + 1;
    const graduated = bank[idx]._correctCount >= REVIEW_CORRECT_NEEDED;
    if (graduated) bank.splice(idx, 1);
    _reviewSaveAll(subjectKey, bank);
    return graduated;
  } catch(_) { return false; }
}

// 復習バンクから問題リストを取得
// genFn: (type) => problem  動的問題の再生成関数
function reviewGetProblems(subjectKey, genFn) {
  const bank = reviewGetAll(subjectKey);
  return bank.map(entry => {
    if (entry._isDynamic && genFn) {
      // タイプ番号から新しい問題を生成（数字はランダム）
      try {
        const fresh = genFn(entry._genType);
        if (fresh) {
          return {
            ...fresh,
            _id: entry._id,           // IDは元のものを維持（正解時の削除に使う）
            _missCount: entry._missCount,
            _correctCount: entry._correctCount,
          };
        }
      } catch(_) {}
    }
    return entry; // 静的問題はそのまま
  }).filter(Boolean);
}

function reviewCount(subjectKey) {
  return reviewGetAll(subjectKey).length;
}

function reviewClear(subjectKey) {
  try { localStorage.removeItem("review_" + subjectKey); } catch(_) {}
}

function reviewGetProgress(subjectKey, problem) {
  try {
    const bank = reviewGetAll(subjectKey);
    const found = bank.find(p => p._id === _reviewId(problem));
    return found ? { correct: found._correctCount || 0, needed: REVIEW_CORRECT_NEEDED } : null;
  } catch(_) { return null; }
}

</script>
<style>
  body { background: #f5f3ff; }
  .cursor-blink { color: #7c3aed; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const SUBJECT_KEY = "calc";
const STORAGE_KEY = "nobe_best";


function genProblemOfType(t){return genProblem(t);}
function genProblem(forceType) {
  const type = forceType !== undefined ? forceType : Math.floor(Math.random() * 4);
  if (type === 0) {
    const n=randInt(4,10), avg=randInt(10,80);
    return {_genType:type,
      title:"平均算①", color:"#8b5cf6",
      text:`${n}人のテストの平均点は **${avg}点** でした。\n${n}人の合計点は何点ですか？`,
      answers:[{label:"合計点",value:n*avg,unit:"点"}],
      hints:["🔑 合計＝平均×人数",`${avg}×${n}＝${n*avg}点 ✅`],
    };
  }
  if (type === 1) {
    const n=randInt(4,8), avg=randInt(15,80);
    return {_genType:type,
      title:"平均算②", color:"#7c3aed",
      text:`${n}人のテストの合計点は **${n*avg}点** でした。\n平均点は何点ですか？`,
      answers:[{label:"平均点",value:avg,unit:"点"}],
      hints:["🔑 平均＝合計÷人数",`${n*avg}÷${n}＝${avg}点 ✅`],
    };
  }
  if (type === 2) {
    const n=randInt(4,8), avg=randInt(20,70);
    const extra=avg + randInt(1,5)*(n+1);
    const newAvg=(n*avg+extra)/(n+1);
    if (!Number.isInteger(newAvg)) return genProblem();
    return {_genType:type,
      title:"平均算③（1人追加）", color:"#6d28d9",
      text:`${n}人の平均点は **${avg}点** でした。\n1人追加したら平均が **${newAvg}点** になりました。\n追加した人の点数は？`,
      answers:[{label:"点数",value:extra,unit:"点"}],
      hints:[`${n}人合計＝${avg}×${n}＝${n*avg}点`,`${n+1}人合計＝${newAvg}×${n+1}＝${newAvg*(n+1)}点`,`追加した人＝${newAvg*(n+1)}−${n*avg}＝${extra}点 ✅`],
    };
  }
  const people=randInt(2,6), days=randInt(3,8), newPeople=randInt(2,8);
  const total=days*people;
  if (total % newPeople !== 0) return genProblem();
  return {_genType:type,
    title:"のべ算", color:"#5b21b6",
    text:`${people}人で **${days}日** かかる仕事があります。\n${newPeople}人でやると何日かかりますか？`,
    answers:[{label:"日数",value:total/newPeople,unit:"日"}],
    hints:["🔑 全仕事量＝人数×日数",`${people}×${days}＝${total}人日`,`${newPeople}人なら${total}÷${newPeople}＝${total/newPeople}日 ✅`],
  };
}


// ─── 途中式表示 ────────────────────────────────────────────
function ScratchDisplay({ scratch, focused }) {
  if (!scratch) return (
    <>
      <span className="scratch-placeholder">ここをタッチして式を入力…</span>
      {focused&&<span className="cursor-blink">|</span>}
    </>
  );
  return (
    <>
      {scratch.split("\n").map((line,li,arr)=>{
        const parts=line.split(/(＝-?\d+\.?\d*)/g);
        return(
          <div key={li} style={{minHeight:"22px",lineHeight:"1.7"}}>
            {parts.map((p,pi)=>
              /^＝-?\d+\.?\d*$/.test(p)
                ?<span key={pi} className="calc-result-badge" style={{background:"#fff3bf",color:"#e67700",borderBottom:"2px solid #ffd43b"}}>{p}</span>
                :<span key={pi}>{p}</span>
            )}
            {focused&&li===arr.length-1&&<span className="cursor-blink">|</span>}
          </div>
        );
      })}
    </>
  );
}

// ─── アプリ ────────────────────────────────────────────────
function App() {
  const [mode,setMode]               = useState("setup");
  const [totalQ,setTotalQ]           = useState(10);
  const [problems,setProblems]       = useState([]);
  const [current,setCurrent]         = useState(0);
  const [score,setScore]             = useState(0);
  const [scratch,setScratch]         = useState("");
  const [calcError,setCalcError]     = useState(false);
  const [answerVals,setAnswerVals]   = useState({});
  const [focused,setFocused]         = useState("scratch");
  const [checked,setChecked]         = useState(false);
  const [correct,setCorrect]         = useState({});
  const [hintIdx,setHintIdx]         = useState(-1);
  const [celeb,setCeleb]             = useState(false);
  const [streak,setStreak]           = useState(0);
  const [best,setBest]               = useState(0);
  const [confirmOpen,setConfirmOpen] = useState(false);
  const [reviewMode,setReviewMode] = useState(false);
  const [reviewBank,setReviewBank]   = useState([]);

  useEffect(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s)setBest(parseInt(s)||0);}catch(_){}
    setReviewBank(reviewGetAll(SUBJECT_KEY));
  },[]);
  const saveBest=v=>{try{localStorage.setItem(STORAGE_KEY,String(v));}catch(_){}};

  const startQuiz=()=>{
    setProblems(Array.from({length:totalQ},()=>genProblem()));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);setConfirmOpen(false);
    setMode("quiz");
  }

  const startReview=()=>{
    const bank=reviewGetAll(SUBJECT_KEY);
    setReviewBank(bank);
    if(bank.length===0){setReviewMode(false);return;}
    setProblems(reviewGetProblems(SUBJECT_KEY,genProblemOfType));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);setConfirmOpen(false);
    setMode("review");
  };;

  const isScratch=focused==="scratch";
  const ansIdx=isScratch?-1:parseInt(focused.split("-")[1]);
  const problem=problems[current]||null;

  const pressKey=useCallback((key)=>{
    if(key.val==="CALC"){
      if(!isScratch)return;
      const r=evalExpr(getExprToParse(scratch));
      if(r===null){setCalcError(true);setTimeout(()=>setCalcError(false),600);return;}
      setScratch(s=>s+`＝${r}`);return;
    }
    if(isScratch){
      if(key.val==="BACK")  setScratch(s=>{const m=s.match(/(＝-?\d+\.?\d*)$/);return m?s.slice(0,-m[0].length):s.slice(0,-1);});
      else if(key.val==="CLEAR") setScratch("");
      else if(key.val==="=")     setScratch(s=>s+"\n");
      else setScratch(s=>s+key.val);
    }else{
      if(key.type==="op"||key.val==="CALC")return;
      setAnswerVals(prev=>{
        const cur=prev[ansIdx]||"";
        if(key.val==="BACK")  return{...prev,[ansIdx]:cur.slice(0,-1)};
        if(key.val==="CLEAR") return{...prev,[ansIdx]:""};
        if(key.val==="."&&cur.includes(".")) return prev;
        if(cur.length>=8)     return prev;
        return{...prev,[ansIdx]:cur+key.val};
      });
    }
  },[isScratch,ansIdx,scratch]);

  const checkAll=()=>{
    const r={};
    problem.answers.forEach((a,i)=>{
      const inputNum=parseFloat(answerVals[i]||"");
      r[i]=Math.abs(inputNum-a.value)<0.01;
    });
    setCorrect(r);setChecked(true);
    if(Object.values(r).every(Boolean)){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true);setTimeout(()=>setCeleb(false),2000);reviewMarkCorrect(SUBJECT_KEY,problem);setReviewBank(reviewGetAll(SUBJECT_KEY));
    }else{setStreak(0);reviewSave(SUBJECT_KEY,problem);setReviewBank(reviewGetAll(SUBJECT_KEY));}
  };

  const nextQuestion=()=>{
    const isEnd=current+1>=problems.length;
    if(isEnd&&mode==="review"){const b=reviewGetAll(SUBJECT_KEY);setReviewBank(b);if(b.length>0){startReview();}else{setMode("graduated");}return;}
    if(isEnd){setMode("result");return;}
    setCurrent(c=>c+1);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);
  };

  const allCorrect=checked&&Object.values(correct).every(Boolean);

  const BTN = "linear-gradient(135deg,#a78bfa,#7c3aed)";
  const SHD = "#5b21b6";
  const TXT = "#fff";

  if(mode==="setup") return(
    <div className="setup-wrap" style={{background:"#f5f3ff"}}>
      <div className="setup-card">
        <div className="setup-emoji">📝</div>
        <h1 className="setup-title">{"のべ算・平均算 練習"}</h1>
        <p className="setup-sub">小学校高学年レベル</p>
                {/* 復習モード */}
        <div style={{marginBottom:"16px"}}>
          <button
            onClick={()=>{if(reviewBank.length>0){setReviewMode(true);startReview();}}}
            style={{width:"100%",padding:"14px 16px",borderRadius:"14px",
              cursor:reviewBank.length>0?"pointer":"default",
              border:reviewBank.length>0?"2px solid #ef4444":"2px solid #e5e7eb",
              background:reviewBank.length>0?"#fef2f2":"#f9fafb",
              display:"flex",alignItems:"center",justifyContent:"space-between",
              fontFamily:"inherit",opacity:reviewBank.length===0?0.45:1}}>
            <div style={{textAlign:"left"}}>
              <div style={{fontWeight:"900",fontSize:"15px",color:reviewBank.length>0?"#b91c1c":"#374151"}}>
                📚 復習モード
              </div>
              {reviewBank.length>0&&<div style={{fontSize:"11px",color:"#ef4444",marginTop:"2px"}}>タップして今すぐ開始！</div>}
            </div>
            <span style={{background:reviewBank.length>0?"#ef4444":"#d1d5db",
              color:"#fff",borderRadius:"99px",padding:"4px 12px",fontSize:"13px",fontWeight:"bold"}}>
              {reviewBank.length>0?`${reviewBank.length}問`:"なし"}
            </span>
          </button>
          {reviewBank.length===0&&<div style={{fontSize:"11px",color:"#9ca3af",textAlign:"center",marginTop:"4px"}}>間違えた問題が溜まるとここで復習できます</div>}
        </div>
        {best>0&&<div className="best-badge" style={{background:"rgba(0,0,0,0.05)",border:"1.5px solid rgba(0,0,0,0.1)"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?`2px solid #7c3aed`:"2px solid #dee2e6",background:totalQ===n?"#7c3aed":"#f8f9fa",color:totalQ===n?"#fff":"#495057",boxShadow:totalQ===n?`0 3px 0 #5b21b6`:"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );


  if(mode==="graduated") return(
    <div className="setup-wrap" style={{background:"#f0fdf4"}}>
      <div className="setup-card">
        <div className="setup-emoji">🎓</div>
        <h2 className="setup-title" style={{color:"#166534"}}>復習バンク卒業！</h2>
        <p style={{fontSize:"14px",color:"#4ade80",marginBottom:"16px",fontWeight:"bold"}}>
          すべての問題を5回正解しました！
        </p>
        <div style={{background:"#dcfce7",borderRadius:"14px",padding:"16px",marginBottom:"16px",fontSize:"13px",color:"#166534",lineHeight:"1.8"}}>
          🌟 間違えた問題をすべてマスターしました！<br/>
          通常モードで新しい問題に挑戦しましょう。
        </div>
        <button className="start-btn" style={{background:"linear-gradient(135deg,#4ade80,#22c55e)",color:"#fff",boxShadow:"0 4px 0 #16a34a"}}
          onClick={()=>{setReviewMode(false);setMode("setup");}}>もどる</button>
      </div>
    </div>
  );

  if(mode==="result"){
    const pct=Math.round((score/totalQ)*100);
    return(
      <div className="setup-wrap" style={{background:"#f5f3ff"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title">おわり！</h2>
          <p className="result-score">{totalQ}問中 <span className="result-big" style={{color:"#7c3aed"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#e9ecef"}}><div className="pct-bar-fill" style={{background:BTN,width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ef4444"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
          {reviewBank.length>0&&(
            <button className="start-btn" style={{background:"linear-gradient(135deg,#ef4444,#dc2626)",color:"#fff",boxShadow:"0 4px 0 #991b1b",marginTop:"8px",width:"100%"}}
              onClick={()=>{setReviewMode(true);startReview();}}>続けて復習する 📚 ({reviewBank.length}問)</button>
          )}
        </div>
      </div>
    );
  }

  if(!problem) return null;
  const progress=(current/totalQ)*100;

  return(
    <div className="quiz-root" style={{background:"#f5f3ff"}}>
      {confirmOpen&&(
        <div className="confirm-overlay" onClick={()=>setConfirmOpen(false)}>
          <div className="confirm-sheet" onClick={e=>e.stopPropagation()}>
            <div className="confirm-title">📝 答え合わせする？</div>
            <div className="confirm-sub">まだ直したいところはない？</div>
            <div className="confirm-btn-row">
              <button className="confirm-cancel-btn" onClick={()=>setConfirmOpen(false)}>もどる</button>
              <button className="confirm-ok-btn" style={{background:BTN,color:TXT}} onClick={()=>{setConfirmOpen(false);checkAll();}}>答え合わせ ✔</button>
            </div>
          </div>
        </div>
      )}
      {celeb&&(
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#7c3aed"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#ef4444"}}>🔥 {streak}れんぞく！</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}

      <div className="quiz-header">
        <div className="header-left">
          <span className="q-label">Q{current+1}<span className="q-total">/{totalQ}</span></span>
          <span className="type-tag" style={{background:problem.color}}>{problem.title}</span>
        </div>
        <div className="header-right">
          <span className="score-label">⭐ {score}</span>
          {streak>=2&&<span className="streak-tag-sm">🔥{streak}</span>}
          {best>0&&<span className="best-tag-sm">🏆{best}</span>}
        </div>
      </div>

      <div className="progress-bg" style={{background:"#e9ecef"}}>
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>

      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        {problem.text.split("\n").map((line,i)=>(
          <p key={i} className="problem-line">
            {line.split(/(\*\*[^*]+\*\*)/).map((seg,j)=>
              seg.startsWith("**")
                ?<strong key={j} className="problem-em" style={{color:problem.color}}>{seg.replace(/\*\*/g,"")}</strong>
                :seg
            )}
          </p>
        ))}
      </div>

      <div className="hint-section">
        <div className="hint-controls">
          <button className="hint-btn"
            onClick={()=>setHintIdx(h=>Math.min(h+1,problem.hints.length-1))}
            disabled={hintIdx>=problem.hints.length-1}
          >
            💡 ヒント{hintIdx<0?"を見る":`(${hintIdx+1}/${problem.hints.length})`}
          </button>
          {hintIdx>=0&&<button className="hint-close-btn" onClick={()=>setHintIdx(-1)}>✕ 閉じる</button>}
        </div>
        {hintIdx>=0&&(
          <div className="hint-box">
            {problem.hints.slice(0,hintIdx+1).map((h,i)=>(
              <div key={i} style={{fontSize:"13px",color:"#374151",lineHeight:"1.8",fontFamily:"monospace",whiteSpace:"pre-wrap",opacity:i<hintIdx?0.55:1}}>{h}</div>
            ))}
          </div>
        )}
      </div>

      <div className="scratch-area"
        style={{border:`2px solid ${calcError?"#ff6b6b":isScratch?"#7c3aed":"#dee2e6"}`,boxShadow:isScratch&&!calcError?`0 0 0 3px ${"#a78bfa"}33`:calcError?"0 0 0 3px rgba(255,107,107,0.15)":"none",background:calcError?"#fff5f5":"#fff"}}
        onClick={()=>setFocused("scratch")}
      >
        <div className="scratch-area-label-row">
          <span className="scratch-area-label">📝 途中式</span>
          <span className="scratch-area-hint">＝計算 で自動計算</span>
        </div>
        <div className="scratch-display"><ScratchDisplay scratch={scratch} focused={isScratch}/></div>
      </div>

      <div className="answers-row">
        {problem.answers.map((a,i)=>{
          const isFoc=focused===`ans-${i}`;
          const isOk=checked?correct[i]:null;
          return(
            <div key={i} className="answer-slot"
              style={{background:isOk===true?"#ebfbee":isOk===false?"#fff5f5":"#fff",border:`2px solid ${isFoc?"#7c3aed":isOk===true?"#51cf66":isOk===false?"#ff6b6b":"#dee2e6"}`,boxShadow:isFoc?`0 0 0 3px ${"#a78bfa"}33`:"none"}}
              onClick={()=>setFocused(`ans-${i}`)}
            >
              <div className="ans-label">{a.label}</div>
              <div style={{display:"flex",alignItems:"baseline",gap:"4px"}}>
                <div className="ans-display">
                  {answerVals[i]||<span className="scratch-placeholder">?</span>}
                  {isFoc&&<span className="cursor-blink">|</span>}
                </div>
                {a.unit&&answerVals[i]&&<span className="ans-unit">{a.unit}</span>}
              </div>
              {isOk===true&&<div className="ans-badge">✅</div>}
              {isOk===false&&<div className="ans-badge">❌</div>}
              {checked&&isOk===false&&<div className="ans-correct-val" style={{color:"#7c3aed"}}>→ {a.value}{a.unit}</div>}
            </div>
          );
        })}
      </div>

      <div className="keypad" style={{background:"#e9ecef"}}>
        {KEYPAD.map((row,ri)=>(
          <div key={ri} className="key-row">
            {row.map(key=>{
              const dis=!isScratch&&(key.type==="op"||key.val==="CALC");
              let bg="#fff",color="#212529";
              if(key.type==="op")  {bg="#74c0fc";color="#1864ab";}
              if(key.type==="ctrl"){bg="#ff8787";color="#fff";}
              if(key.val==="CALC") {bg=BTN;color=TXT;}
              if(dis)              {bg="#dee2e6";color="#adb5bd";}
              return(
                <button key={key.val} className={`key-btn${key.val==="CALC"?" calc":""}${dis?" disabled":""}`}
                  style={{background:bg,color,boxShadow:dis?"none":"0 3px 0 rgba(0,0,0,0.18)"}}
                  onClick={()=>!dis&&pressKey(key)} disabled={dis}
                >{key.label}</button>
              );
            })}
          </div>
        ))}
      </div>

      <div className="action-row">
        {!checked?(
          <button className="check-btn" style={{background:BTN,color:TXT,boxShadow:`0 4px 0 ${SHD}`}} onClick={()=>setConfirmOpen(true)}>こたえをチェック ✔</button>
        ):(
          <>
            <button className="next-btn" style={{background:"linear-gradient(135deg,#51cf66,#20c997)",color:"#fff",boxShadow:"0 4px 0 #2f9e44"}} onClick={nextQuestion}>
              {current+1>=problems.length?(mode==="review"?reviewGetAll(SUBJECT_KEY).length>0?"続きへ 🔁":"卒業！ 🎓":"結果を見る 🎉"):"つぎへ →"}
            </button>
            {!allCorrect&&<button className="retry-btn" onClick={()=>{setChecked(false);setCorrect({});{}}}>やりなおす</button>}
          </>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
