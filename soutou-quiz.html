<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>相当算 練習</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="common.js"></script>
<style>
  body { background: #fffbeb; }
  .cursor-blink { color: #d97706; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect } = React;
const STORAGE_KEY = "soutou_best_streak";

function genProblem() {
  const type = Math.floor(Math.random() * 4);

  if (type === 0) {
    // □の何分のいくつが○
    const denom=randInt(3,8), num=randInt(1,denom-1);
    const part=randInt(10,60);
    if (part*denom % num !== 0) return genProblem();
    const whole=part*denom/num;
    return {
      title:"相当算①", color:"#d97706",
      text:`ある数の **${num}/${denom}** が **${part}** です。\nある数はいくつですか？`,
      answers:[{label:"ある数",value:whole,unit:""}],
      hints:[
        `🔑 ${num}/${denom}が${part}なら、1/${denom}は？`,
        `1/${denom}＝${part}÷${num}＝${part/num}`,
        `全体＝${part/num}×${denom}＝${whole} ✅`,
      ],
    };
  }
  if (type === 1) {
    // 残りの分数
    const whole=randInt(20,120);
    const denom=randInt(3,6), num=randInt(1,denom-1);
    const used=Math.floor(whole*num/denom);
    if (whole*num % denom !== 0) return genProblem();
    const rest=whole-used;
    return {
      title:"相当算②（残り）", color:"#b45309",
      text:`${whole}ページの本を読んでいます。\n全体の **${num}/${denom}** を読みました。\n残りは何ページですか？`,
      answers:[{label:"残りページ",value:rest,unit:"ページ"}],
      hints:[
        `🔑 読んだページ数を先に求めよう`,
        `読んだ：${whole}×${num}/${denom}＝${used}ページ`,
        `残り：${whole}−${used}＝${rest}ページ ✅`,
      ],
    };
  }
  if (type === 2) {
    // お金の問題
    const total=randInt(200,800);
    const d1=randInt(3,5), n1=randInt(1,d1-1);
    const spent=Math.floor(total*n1/d1);
    if (total*n1 % d1 !== 0) return genProblem();
    const rest=total-spent;
    return {
      title:"相当算③（お金）", color:"#92400e",
      text:`${total}円持っています。\n **${n1}/${d1}** を使いました。\n残りは何円ですか？`,
      answers:[{label:"残り",value:rest,unit:"円"}],
      hints:[
        `🔑 使った金額を求めよう`,
        `使った：${total}×${n1}/${d1}＝${spent}円`,
        `残り：${total}−${spent}＝${rest}円 ✅`,
      ],
    };
  }
  // 2段階で使う
  const total=randInt(100,500);
  const d1=randInt(2,4), n1=1;
  const rest1=total-Math.floor(total*n1/d1);
  if (total*n1 % d1 !== 0) return genProblem();
  const d2=randInt(2,4), n2=1;
  const used2=Math.floor(rest1*n2/d2);
  if (rest1*n2 % d2 !== 0) return genProblem();
  const rest2=rest1-used2;
  return {
    title:"相当算④（2段階）", color:"#78350f",
    text:`${total}円持っています。\nはじめに **1/${d1}** を使い、\n残りの **1/${d2}** をさらに使いました。\n最後に残った金額は？`,
    answers:[{label:"残り",value:rest2,unit:"円"}],
    hints:[
      `🔑 順番に計算しよう`,
      `1回目後：${total}−${total/d1}＝${rest1}円`,
      `2回目後：${rest1}−${rest1/d2}＝${rest2}円 ✅`,
    ],
  };
}

function App() {
  const [mode,setMode]             = useState("setup");
  const [totalQ,setTotalQ]         = useState(10);
  const [problems,setProblems]     = useState([]);
  const [current,setCurrent]       = useState(0);
  const [score,setScore]           = useState(0);
  const [scratch,setScratch]       = useState("");
  const [calcError,setCalcError]   = useState(false);
  const [answerVals,setAnswerVals] = useState({});
  const [focused,setFocused]       = useState("scratch");
  const [checked,setChecked]       = useState(false);
  const [correct,setCorrect]       = useState({});
  const [hintIdx,setHintIdx]       = useState(-1);
  const [celeb,setCeleb]           = useState(false);
  const [streak,setStreak]         = useState(0);
  const [best,setBest]             = useState(0);
  const [confirmOpen,setConfirmOpen] = useState(false);

  useEffect(()=>{
    try{const s=localStorage.getItem(STORAGE_KEY);if(s)setBest(parseInt(s)||0);}catch(_){}
  },[]);
  const saveBest=v=>{try{localStorage.setItem(STORAGE_KEY,String(v));}catch(_){}};

  const startQuiz=()=>{
    setProblems(Array.from({length:totalQ},()=>genProblem()));
    setCurrent(0);setScore(0);setStreak(0);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);
    setMode("quiz");
  };

  const isScratch=focused==="scratch";
  const ansIdx=isScratch?-1:parseInt(focused.split("-")[1]);
  const problem=problems[current]||null;

  const pressKey=useCallback((key)=>{
    if(key.val==="CALC"){
      if(!isScratch)return;
      const r=evalExpr(getExprToParse(scratch));
      if(r===null){setCalcError(true);setTimeout(()=>setCalcError(false),600);return;}
      setScratch(s=>s+`＝${r}`);return;
    }
    if(isScratch){
      if(key.val==="BACK")  setScratch(s=>{const m=s.match(/(＝-?\d+\.?\d*)$/);return m?s.slice(0,-m[0].length):s.slice(0,-1);});
      else if(key.val==="CLEAR") setScratch("");
      else if(key.val==="=")     setScratch(s=>s+"\n");
      else setScratch(s=>s+key.val);
    }else{
      if(key.type==="op"||key.val==="CALC")return;
      setAnswerVals(prev=>{
        const cur=prev[ansIdx]||"";
        if(key.val==="BACK")  return{...prev,[ansIdx]:cur.slice(0,-1)};
        if(key.val==="CLEAR") return{...prev,[ansIdx]:""};
        if(cur.length>=5)     return prev;
        return{...prev,[ansIdx]:cur+key.val};
      });
    }
  },[isScratch,ansIdx,scratch]);

  const checkAll=()=>{
    const r={};
    problem.answers.forEach((a,i)=>{r[i]=parseInt(answerVals[i]||"")===a.value;});
    setCorrect(r);setChecked(true);
    if(Object.values(r).every(Boolean)){
      setScore(s=>s+1);const ns=streak+1;setStreak(ns);
      if(ns>best){setBest(ns);saveBest(ns);}
      setCeleb(true);setTimeout(()=>setCeleb(false),2000);
    }else{setStreak(0);}
  };

  const nextQuestion=()=>{
    if(current+1>=totalQ){setMode("result");return;}
    setCurrent(c=>c+1);
    setScratch("");setAnswerVals({});setFocused("scratch");
    setChecked(false);setCorrect({});setHintIdx(-1);setCeleb(false);
  };

  const allCorrect=checked&&Object.values(correct).every(Boolean);

  if(mode==="setup") return(
    <div className="setup-wrap" style={{background:"#fdf6e3"}}>
      <div className="setup-card">
        <div className="setup-emoji">✏️</div>
        <h1 className="setup-title" style={{color:"#212529"}}>和差算 練習</h1>
        <p className="setup-sub">小学校高学年レベル</p>
        {best>0&&<div className="best-badge" style={{background:"#fff9db",border:"1.5px solid #ffd43b",color:"#5c3d02"}}>🏆 最高連続記録：<strong>{best}問</strong></div>}
        <div className="qcount-section">何問やる？</div>
        <div className="qcount-grid">
          {Q_OPTIONS.map(n=>(
            <button key={n} className="qcount-btn"
              style={{border:totalQ===n?"2px solid #f59f00":"2px solid #dee2e6",background:totalQ===n?"#ffd43b":"#f8f9fa",color:totalQ===n?"#5c3d02":"#495057",boxShadow:totalQ===n?"0 3px 0 #f59f00":"none"}}
              onClick={()=>setTotalQ(n)}>{n}問</button>
          ))}
        </div>
        <button className="start-btn" style={{background:"linear-gradient(135deg,#ffd43b,#ffa94d)",color:"#5c3d02",boxShadow:"0 4px 0 #f59f00"}} onClick={startQuiz}>スタート！ 🚀</button>
      </div>
    </div>
  );

  if(mode==="result"){
    const pct=Math.round((score/totalQ)*100);
    return(
      <div className="setup-wrap" style={{background:"#fdf6e3"}}>
        <div className="setup-card">
          <div className="setup-emoji">{pct===100?"🏆":pct>=70?"🎉":"💪"}</div>
          <h2 className="setup-title" style={{color:"#212529"}}>おわり！</h2>
          <p className="result-score">{totalQ}問中 <span className="result-big" style={{color:"#ff922b"}}>{score}</span> 問正解</p>
          <div className="pct-bar-bg" style={{background:"#e9ecef"}}><div className="pct-bar-fill" style={{background:"linear-gradient(90deg,#ffd43b,#ffa94d)",width:`${pct}%`}}/></div>
          <p className="pct-text">{pct}%</p>
          <div className="streak-result-row">
            <div className="streak-result-box"><div className="streak-result-label">この回の最高連続</div><div className="streak-result-val" style={{color:"#ff6b6b"}}>🔥 {streak}問</div></div>
            <div className="streak-result-box"><div className="streak-result-label">歴代最高連続</div><div className="streak-result-val" style={{color:"#f59f00"}}>🏆 {best}問</div></div>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"16px"}}>
            <button className="start-btn" style={{background:"linear-gradient(135deg,#ffd43b,#ffa94d)",color:"#5c3d02",boxShadow:"0 4px 0 #f59f00"}} onClick={startQuiz}>もう一度</button>
            <button className="start-btn" style={{background:"#868e96",color:"#fff",boxShadow:"0 4px 0 #495057"}} onClick={()=>setMode("setup")}>設定へ</button>
          </div>
        </div>
      </div>
    );
  }

  if(!problem) return null;
  const progress=(current/totalQ)*100;

  return(
    <div className="quiz-root" style={{background:"#fdf6e3"}}>

      {/* 答え合わせ確認モーダル */}
      {confirmOpen&&(
        <div className="confirm-overlay" onClick={()=>setConfirmOpen(false)}>
          <div className="confirm-sheet" onClick={e=>e.stopPropagation()}>
            <div className="confirm-title">📝 答え合わせする？</div>
            <div className="confirm-sub">まだ直したいところはない？</div>
            <div className="confirm-btn-row">
              <button className="confirm-cancel-btn" onClick={()=>setConfirmOpen(false)}>もどる</button>
              <button className="confirm-ok-btn" style={{background:"linear-gradient(135deg,linear-gradient(135deg,#fbbf24,#d97706),linear-gradient(135deg,#fbbf24,#d97706))",color:"#fff"} onClick={()=>{setConfirmOpen(false);checkAll();}}>答え合わせ ✔</button>
            </div>
          </div>
        </div>
      )}

      {/* お祝い */}
      {celeb&&(
        <div className="celeb-overlay">
          <div className="celeb-box">
            <div className="celeb-emoji">🎉</div>
            <div className="celeb-text" style={{color:"#2f9e44"}}>せいかい！</div>
            <div className="celeb-stars">{randomStars(5)}</div>
            {streak>=3&&<div className="celeb-streak" style={{background:"#ff6b6b"}}>🔥 {streak}れんぞく！</div>}
            {streak===best&&streak>1&&<div className="celeb-streak" style={{background:"#f59f00",marginTop:"6px"}}>🏆 新記録！</div>}
          </div>
        </div>
      )}

      {/* ヘッダー */}
      <div className="quiz-header">
        <div className="header-left">
          <span className="q-label" style={{color:"#343a40"}}>Q{current+1}<span className="q-total">/{totalQ}</span></span>
          <span className="type-tag" style={{background:problem.color}}>{problem.title}</span>
        </div>
        <div className="header-right">
          <span className="score-label" style={{color:"#495057"}}>⭐ {score}</span>
          {streak>=2&&<span className="streak-tag-sm">🔥{streak}</span>}
          {best>0&&<span className="best-tag-sm">🏆{best}</span>}
        </div>
      </div>

      {/* プログレスバー */}
      <div className="progress-bg" style={{background:"#e9ecef"}}>
        <div className="progress-fill" style={{background:problem.color,width:`${progress}%`}}/>
      </div>

      {/* 問題文 */}
      <div className="problem-card" style={{borderTop:`5px solid ${problem.color}`}}>
        {problem.text.split("\n").map((line,i)=>(
          <p key={i} className="problem-line">
            {line.split(/(\*\*[^*]+\*\*)/).map((seg,j)=>
              seg.startsWith("**")
                ?<strong key={j} className="problem-em" style={{color:problem.color}}>{seg.replace(/\*\*/g,"")}</strong>
                :seg
            )}
          </p>
        ))}
      </div>

      {/* ヒント */}
      <div className="hint-section">
        <div className="hint-controls">
          <button className="hint-btn"
            onClick={()=>setHintIdx(h=>Math.min(h+1,problem.hints.length-1))}
            disabled={hintIdx>=problem.hints.length-1}
          >
            💡 ヒント{hintIdx<0?"を見る":`(${hintIdx+1}/${problem.hints.length})`}
          </button>
          {hintIdx>=0&&(
            <button className="hint-close-btn" onClick={()=>setHintIdx(-1)}>
              ✕ 閉じる
            </button>
          )}
        </div>
        {hintIdx>=0&&(
          <div className="hint-box">
            {problem.hints.slice(0,hintIdx+1).map((h,i)=>(
              <div key={i} style={{fontSize:"13px",color:"#495057",lineHeight:"1.8",fontFamily:"monospace",opacity:i<hintIdx?0.55:1}}>{h}</div>
            ))}
          </div>
        )}
      </div>

      {/* 途中式 */}
      <div className="scratch-area"
        style={{border:`2px solid ${calcError?"#ff6b6b":isScratch?"#339af0":"#dee2e6"}`,boxShadow:isScratch&&!calcError?"0 0 0 3px rgba(51,154,240,0.15)":calcError?"0 0 0 3px rgba(255,107,107,0.15)":"none",background:calcError?"#fff5f5":"#fff"}}
        onClick={()=>setFocused("scratch")}
      >
        <div className="scratch-area-label-row">
          <span className="scratch-area-label">📝 途中式</span>
          <span className="scratch-area-hint">＝計算 で自動計算</span>
        </div>
        <div className="scratch-display"><ScratchDisplay scratch={scratch} focused={isScratch}/></div>
      </div>

      {/* 答え欄 */}
      <div className="answers-row">
        {problem.answers.map((a,i)=>{
          const isFoc=focused===`ans-${i}`;
          const isOk=checked?correct[i]:null;
          return(
            <div key={i} className="answer-slot"
              style={{background:isOk===true?"#ebfbee":isOk===false?"#fff5f5":"#fff",border:`2px solid ${isFoc?"#339af0":isOk===true?"#51cf66":isOk===false?"#ff6b6b":"#dee2e6"}`,boxShadow:isFoc?"0 0 0 3px rgba(51,154,240,0.15)":"none"}}
              onClick={()=>setFocused(`ans-${i}`)}
            >
              <div className="ans-label">{a.label}</div>
              <div className="ans-display">
                {answerVals[i]||<span className="scratch-placeholder">?</span>}
                {isFoc&&<span className="cursor-blink">|</span>}
              </div>
              {isOk===true &&<div className="ans-badge">✅</div>}
              {isOk===false&&<div className="ans-badge">❌</div>}
              {checked&&isOk===false&&<div className="ans-correct-val" style={{color:"#2f9e44"}}>→ {a.value}</div>}
            </div>
          );
        })}
      </div>

      {/* キーパッド */}
      <div className="keypad" style={{background:"#e9ecef"}}>
        {KEYPAD.map((row,ri)=>(
          <div key={ri} className="key-row">
            {row.map(key=>{
              const dis=!isScratch&&(key.type==="op"||key.val==="CALC");
              let bg="#fff",color="#212529";
              if(key.type==="op")  {bg="#74c0fc";color="#1864ab";}
              if(key.type==="ctrl"){bg="#ff8787";color="#fff";}
              if(key.val==="CALC") {bg="linear-gradient(135deg,#ffd43b,#ffa94d)";color="#5c3d02";}
              if(dis)              {bg="#dee2e6";color="#adb5bd";}
              return(
                <button key={key.val} className={`key-btn${key.val==="CALC"?" calc":""}${dis?" disabled":""}`}
                  style={{background:bg,color,boxShadow:dis?"none":"0 3px 0 rgba(0,0,0,0.18)"}}
                  onClick={()=>!dis&&pressKey(key)} disabled={dis}
                >{key.label}</button>
              );
            })}
          </div>
        ))}
      </div>

      {/* アクション */}
      <div className="action-row">
        {!checked?(
          <button className="check-btn" style={{background:"linear-gradient(135deg,#ffd43b,#ffa94d)",color:"#5c3d02",boxShadow:"0 4px 0 #f59f00"}} onClick={()=>setConfirmOpen(true)}>こたえをチェック ✔</button>
        ):(
          <>
            <button className="next-btn" style={{background:"linear-gradient(135deg,#51cf66,#20c997)",color:"#fff",boxShadow:"0 4px 0 #2f9e44"}} onClick={nextQuestion}>
              {current+1>=totalQ?"結果を見る 🎉":"つぎへ →"}
            </button>
            {!allCorrect&&<button className="retry-btn" onClick={()=>{setChecked(false);setCorrect({});}}>やりなおす</button>}
          </>
        )}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
